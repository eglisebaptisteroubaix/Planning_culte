<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Planning des cultes 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F2E9;
    --cream-deep:#EFE6D6;
    --ink:#2B2A28;
    --ink-soft:#5B5650;
    --accent:#2E4D5E;
    --accent-deep:#1F3B49;
    --accent-pale:#E4ECEE;
    --sc-col:#C6643E;
    --sc-pale:#F4E2D4;
    --dej-col:#6F8366;
    --dej-pale:#E7EDE3;
    --line:#DCD3C2;
    --white:#FFFFFF;
    --radius:14px;
    --shadow:0 1px 2px rgba(43,42,40,0.06), 0 6px 18px -8px rgba(43,42,40,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'Source Sans 3',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100%;}
  #root{min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3,.display{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-0.01em;color:var(--ink);}

  /* ---- Topbar ---- */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:rgba(247,242,233,0.94);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:10px 16px;
    display:flex;align-items:center;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .brand .mark{
    width:32px;height:32px;border-radius:9px;flex:none;
    background:linear-gradient(155deg,var(--accent),var(--accent-deep));
    display:flex;align-items:center;justify-content:center;
    color:var(--cream);font-family:'Fraunces',serif;font-weight:700;font-size:16px;
  }
  .brand-text{display:flex;flex-direction:column;min-width:0;}
  .brand-text .t1{font-family:'Fraunces',serif;font-weight:600;font-size:15px;line-height:1.15;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-text .t2{font-size:11px;color:var(--ink-soft);letter-spacing:.02em;}
  .topbar-right{display:flex;align-items:center;gap:7px;flex:none;}

  .pill-btn{
    border:1px solid var(--line);background:var(--white);color:var(--ink);
    border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;
    transition:transform .12s ease,box-shadow .12s ease,background .15s ease;white-space:nowrap;
  }
  .pill-btn:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .pill-btn:active{transform:translateY(0);}
  .pill-btn.ghost{background:transparent;}
  .pill-btn.admin{background:var(--accent);border-color:var(--accent);color:var(--cream);}
  .pill-btn.admin:hover{background:var(--accent-deep);}
  .pill-btn.danger{background:#C0392B;border-color:#C0392B;color:var(--white);}
  .pill-btn.small{padding:5px 11px;font-size:12px;}

  /* ---- Identity bar (sticky) ---- */
  .identity-bar{
    position:sticky;top:52px;z-index:28;
    background:var(--accent-pale);border-bottom:1px solid var(--line);
    padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .identity-bar .label{font-size:12.5px;color:var(--accent-deep);font-weight:700;white-space:nowrap;}
  select.name-select{
    font-family:inherit;font-size:14px;padding:7px 11px;border-radius:10px;
    border:1.5px solid var(--accent);background:var(--white);color:var(--ink);
    cursor:pointer;max-width:260px;flex:1;
  }
  .you-badge{
    display:inline-flex;align-items:center;gap:8px;background:var(--white);
    border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 5px;
    font-size:13.5px;font-weight:600;color:var(--accent-deep);
  }
  .you-badge .avatar{
    width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--white);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Fraunces',serif;
  }
  .you-badge button{border:none;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;margin-left:4px;}
  .admin-banner{
    position:sticky;top:52px;z-index:28;
    background:var(--accent-deep);color:var(--cream);padding:8px 16px;
    font-size:13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .admin-banner b{font-weight:700;}

  /* ---- Month nav ---- */
  .month-nav{
    background:var(--white);border-bottom:1px solid var(--line);
    padding:8px 16px;overflow-x:auto;white-space:nowrap;
    display:flex;gap:6px;align-items:center;scrollbar-width:none;
  }
  .month-nav::-webkit-scrollbar{display:none;}
  .month-btn{
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    border-radius:999px;padding:5px 13px;font-size:12.5px;font-weight:600;
    cursor:pointer;font-family:inherit;white-space:nowrap;flex:none;transition:all .18s ease;
  }
  .month-btn:hover{background:var(--accent-pale);color:var(--accent-deep);border-color:var(--accent);}

  /* ---- Main ---- */
  .main{flex:1;padding:16px 16px 90px;max-width:940px;margin:0 auto;width:100%;}
  .legend-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;padding:0 2px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .month-anchor{display:block;height:0;overflow:hidden;}
  .month-header{
    font-family:'Fraunces',serif;font-size:21px;font-weight:600;color:var(--accent-deep);
    margin:28px 0 12px;display:flex;align-items:baseline;gap:10px;
  }
  .month-header:first-child{margin-top:4px;}
  .month-header .count{font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--cream-deep);padding:3px 9px;border-radius:999px;}

  /* ---- Card ---- */
  .card{background:var(--white);border-radius:var(--radius);border:1px solid var(--line);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);display:flex;}
  .card .stripe{width:5px;flex:none;}
  .stripe.sc{background:var(--sc-col);}
  .stripe.normal{background:var(--accent);}
  .stripe.dej{background:var(--dej-col);}
  .card-body{flex:1;padding:13px 15px 14px;min-width:0;}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .date-block{display:flex;flex-direction:column;}
  .date-main{font-family:'Fraunces',serif;font-size:16.5px;font-weight:600;color:var(--ink);}
  .date-sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .type-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 9px;border-radius:999px;flex:none;white-space:nowrap;}
  .type-badge.sc{background:var(--sc-pale);color:var(--sc-col);}
  .type-badge.dej{background:var(--dej-pale);color:var(--dej-col);}
  .type-badge.normal{background:var(--accent-pale);color:var(--accent-deep);}
  .remark{font-size:12px;color:var(--sc-col);background:var(--sc-pale);border-radius:8px;padding:5px 10px;margin-bottom:9px;font-weight:600;}
  .remark-admin{font-size:12px;color:var(--accent-deep);background:var(--accent-pale);border-radius:8px;padding:5px 10px;margin-bottom:9px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;}

  /* ---- Slots ---- */
  .slots{display:flex;flex-direction:column;gap:6px;}
  .slot-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:8px 0 2px;}
  .slot-group-title:first-child{margin-top:0;}
  .slot{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--cream);border:1px solid transparent;transition:background .15s ease;}
  .slot .slot-label{font-size:12px;color:var(--ink-soft);width:130px;flex:none;font-weight:600;}
  .slot .slot-value{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--ink);}
  .slot.empty .slot-value{color:#B7AE9C;font-weight:500;font-style:italic;}
  .slot.locked{background:var(--cream-deep);}
  .slot.mine{background:var(--accent-pale);border-color:var(--accent);}
  .slot-action{flex:none;}
  .btn-take{font-family:inherit;font-size:12px;font-weight:700;border-radius:999px;padding:5px 11px;border:1.5px solid var(--accent);background:var(--white);color:var(--accent);cursor:pointer;white-space:nowrap;transition:background .15s ease,color .15s ease;}
  .btn-take:hover{background:var(--accent);color:var(--white);}
  .btn-take:disabled{opacity:.35;cursor:not-allowed;border-color:var(--line);color:var(--ink-soft);}
  .btn-clear{font-family:inherit;font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px;border:1.5px solid var(--sc-col);background:transparent;color:var(--sc-col);cursor:pointer;white-space:nowrap;transition:background .15s ease,color .15s ease;}
  .btn-clear:hover{background:var(--sc-col);color:var(--white);}
  .lock-icon{font-size:13px;color:var(--ink-soft);flex:none;}

  /* ---- Modals ---- */
  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .empty-state .display{font-size:20px;margin-bottom:6px;}
  .overlay{position:fixed;inset:0;background:rgba(25,22,18,0.5);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
  .modal{background:var(--white);border-radius:18px;max-width:440px;width:100%;padding:24px 22px 20px;box-shadow:0 20px 60px -10px rgba(0,0,0,.35);max-height:90vh;overflow-y:auto;margin:auto;}
  .modal h2{font-size:19px;margin:0 0 6px;}
  .modal p{font-size:13px;color:var(--ink-soft);margin:0 0 14px;line-height:1.5;}
  .modal input[type=text],.modal input[type=password],.modal textarea,.modal select.field-select{width:100%;font-family:inherit;font-size:14px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);margin-bottom:10px;background:var(--cream);color:var(--ink);}
  .modal input:focus,.modal textarea:focus,.modal select.field-select:focus{outline:none;border-color:var(--accent);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap;}
  .err-msg{font-size:12px;color:#C0392B;margin:-4px 0 8px;font-weight:600;}
  .modal-wide{max-width:560px;}
  .modal-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .modal-header-row h2{margin:0;}
  .field-label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin:12px 0 5px;}
  .field-label:first-of-type{margin-top:2px;}
  .perm-list{display:flex;flex-direction:column;gap:7px;margin-bottom:6px;}
  .perm-row{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);cursor:pointer;padding:3px 0;}
  .perm-row input[type=checkbox]{width:16px;height:16px;margin:0;accent-color:var(--accent);flex:none;}
  .person-list{max-height:45vh;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin:4px 0 14px;padding-right:2px;}
  .person-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border-radius:10px;background:var(--cream);border:1px solid var(--line);}
  .person-name{font-weight:700;font-size:13.5px;color:var(--ink);}
  .person-meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .person-deleted{opacity:0.5;text-decoration:line-through;}
  .person-actions{display:flex;gap:6px;align-items:center;flex:none;}
  .admin-select{font-family:inherit;font-size:12.5px;padding:4px 7px;border-radius:8px;border:1px solid var(--line);background:var(--white);max-width:170px;}
  .rubrique-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
  .rubrique-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:9px;background:var(--cream);border:1px solid var(--line);}
  .rubrique-info{font-size:13px;font-weight:600;color:var(--ink);}
  .rubrique-meta{font-size:11px;color:var(--ink-soft);}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:80;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);animation:rise .25s ease;pointer-events:none;}
  @keyframes rise{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}
  .footer-note{text-align:center;font-size:11px;color:var(--ink-soft);padding:16px 16px 26px;}
  @media(max-width:480px){.slot{flex-wrap:wrap;}.slot .slot-label{width:100%;}.brand-text .t2{display:none;}.topbar{padding:8px 12px;}.identity-bar{top:48px;}.admin-banner{top:48px;}}
</style>

  function el(tag,attrs,children){
    var node=document.createElement(tag); attrs=attrs||{};
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k]; if(v==null) return;
      if(k==='class') node.className=v;
      else if(k==='html') node.innerHTML=v;
      else if(k.indexOf('on')===0&&typeof v==='function') node.addEventListener(k.slice(2),v);
      else if(k==='disabled'){if(v) node.setAttribute('disabled','disabled');}
      else if(k==='checked'){node.checked=!!v;}
      else if(k==='selected'){if(v) node.setAttribute('selected','selected');}
      else if(k==='style') node.setAttribute('style',v);
      else node.setAttribute(k,v);
    });
    (children||[]).forEach(function(c){ if(c==null) return; if(typeof c==='string') node.appendChild(document.createTextNode(c)); else node.appendChild(c); });
    return node;
  }

  function dateFR(iso){

  function slotEligible(person,slotDef){
    if(!person||person._deleted) return false;
    if(!person[slotDef.perm]) return false;
    if(slotDef.group&&person.groupe!==slotDef.group) return false;
    return true;
  }

  function renderSlot(row,def){
    var value=getEffectiveValue(row,def.key);
    var rawVal=row[def.key];
    var jeunesLocked=rawVal==='Jeunes';
    var hasValue=value!=null&&value!==''&&value!=='-----';
    var isGuest=hasValue&&value.indexOf('Invité')===0;
    var mine=hasValue&&state.currentUser&&value===state.currentUser;
    var slotClasses='slot'+(hasValue?' locked':' empty')+(mine?' mine':'');
    var valueNode=el('span',{class:'slot-value'},[hasValue?value:'À pourvoir']);
    var actionNode;
    if(state.isAdmin){
      var sel=el('select',{class:'admin-select',onchange:function(e){
        var v=e.target.value;
        if(v==='__guest__'){ state.showGuestModal=true; state.guestTarget={rowId:row.id,fieldKey:def.key,label:def.label}; state.guestName=''; render(); return; }
        adminSetSlot(row.id,def.key,v);
      }},[el('option',{value:''},['— vide —'])]
        .concat(getNamesSorted(false).map(function(n){ var o=el('option',{value:n},[n]); if(n===value) o.setAttribute('selected','selected'); return o; }))
        .concat([el('option',{value:'__guest__',selected:isGuest},['Invité…'])])
      );
      actionNode=sel;
    } else if(jeunesLocked){
      actionNode=el('span',{class:'lock-icon'},['🔒']);
    } else if(hasValue&&mine){
      actionNode=el('button',{class:'btn-clear',onclick:function(){ releaseSlot(row.id,def.key,value); }},['Retirer mon inscription']);
    } else if(hasValue){
      actionNode=el('span',{class:'lock-icon'},['🔒']);
    } else {
      var person=state.currentUser?byName(state.currentUser):null;
      var eligible=slotEligible(person,def);
      var isUserGuest=state.currentUser==='Invité';
      if(isUserGuest){
        actionNode=el('button',{class:'btn-take',onclick:function(){ state.showGuestModal=true; state.guestTarget={rowId:row.id,fieldKey:def.key,label:def.label}; state.guestName=''; render(); }},['Préciser le nom']);
      } else {
        actionNode=el('button',{class:'btn-take',disabled:!state.currentUser||!eligible,
          title:!state.currentUser?'Choisissez votre nom':(!eligible?'Vous n\u2019êtes pas habilité':''),
          onclick:function(){ takeSlot(row.id,def.key,def.label); }
        },[state.currentUser&&!eligible?'Non habilité':'Je m\u2019inscris']);
      }
    }
    return el('div',{class:slotClasses},[el('span',{class:'slot-label'},[def.label]),valueNode,el('span',{class:'slot-action'},[actionNode])]);
  }

  function renderCard(row,occurrence){
    var effRow=getRowPlanning(row);
    var ct=cardType(effRow);
    var d=dateFR(row.date);
    var defs=getSlotDefs(effRow);
    var defByKey={}; defs.forEach(function(d){ defByKey[d.key]=d; });

    var groups=[{title:null,keys:['predicateur','presidentCulte','accueil1','accueil2','accueil3','accueil4']}];
    if(effRow.hasSainteCene){
      groups.push({title:'Sainte-Cène',keys:['presidentSainteCene']});
      groups.push({title:'Union — distribution Sainte-Cène',keys:['unionDist1','unionDist2']});
      groups.push({title:'Baptiste — distribution Sainte-Cène',keys:['baptisteDist1','baptisteDist2']});
    }
    groups.push({title:'Union — collecte offrandes',keys:['unionCollecte1','unionCollecte2']});
    groups.push({title:'Baptiste — collecte offrandes',keys:['baptisteCollecte1','baptisteCollecte2']});
    (state.customRubriques||[]).forEach(function(r){
      if(r.scOnly&&!effRow.hasSainteCene) return;
      groups.push({title:r.label+(r.group?' — '+r.group:''),keys:[r.key+'_1',r.key+'_2']});
    });

    var slotsContainer=el('div',{class:'slots'},[]);
    groups.forEach(function(g){
      if(!g.keys.some(function(k){ return defByKey[k]; })) return;
      if(g.title) slotsContainer.appendChild(el('div',{class:'slot-group-title'},[g.title]));
      g.keys.forEach(function(k){ if(defByKey[k]) slotsContainer.appendChild(renderSlot(effRow,defByKey[k])); });
    });

    var remarque=getEffectiveValue(effRow,'__remarque')||row.remarques;
    var bodyChildren=[];
    var topChildren=[
      el('div',{class:'date-block'},[
        el('span',{class:'date-main'},[d.dayLabel.charAt(0).toUpperCase()+d.dayLabel.slice(1)+' '+d.full]),
        el('span',{class:'date-sub'},[d.year+(row.typeCulte==='Petit-déjeuner'?' · petit-déjeuner partagé':'')+(occurrence>1?' · 2ᵉ intervenant ce jour':'')])
      ]),

        el('span',{class:'type-badge '+ct.cls},[ct.label]),
        state.isAdmin?el('button',{class:'pill-btn ghost small',title:effRow.hasSainteCene?'Retirer la Sainte-Cène':'Ajouter la Sainte-Cène',onclick:function(e){ e.stopPropagation(); adminToggleSC(row.id,effRow.hasSainteCene); }},[effRow.hasSainteCene?'✗ SC':'+ SC']):null
      ])
    ];
    bodyChildren.push(el('div',{class:'card-top'},topChildren));

    if(remarque){
      if(state.isAdmin){
        bodyChildren.push(el('div',{class:'remark-admin'},[
          el('span',{},['📋 '+remarque]),
          el('button',{class:'pill-btn ghost small',onclick:function(){ state.showRemarqueModal=true; state.remarqueTarget=row.id; state.remarqueText=remarque||''; render(); }},['Modifier'])
        ]));
      } else {
        bodyChildren.push(el('div',{class:'remark'},['📋 '+remarque]));
      }
    } else if(state.isAdmin){
      bodyChildren.push(el('button',{class:'pill-btn ghost small',style:'margin-bottom:8px;font-size:11px;',onclick:function(){ state.showRemarqueModal=true; state.remarqueTarget=row.id; state.remarqueText=''; render(); }},['+ Ajouter une remarque']));
    }
    bodyChildren.push(slotsContainer);

    return el('div',{class:'card'},[el('div',{class:'stripe '+ct.cls}),el('div',{class:'card-body'},bodyChildren)]);
  }

    var MONTHS_ORDER=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

    PLANNING_RAW.forEach(function(row){
      if(row.date!==lastDate){ dateOcc=1; lastDate=row.date; } else { dateOcc++; }

        lastMonth=row.mois;

      }
      main.appendChild(renderCard(row,dateOcc));
    });
    return main;
  }

    if(!state.showManageRubriques) return null;
    if(state.manageRubriqueEditing!=null){
      var f=state.manageRubriqueForm; var isNew=state.manageRubriqueEditing==='__new__';
      var groupSelect=el('select',{class:'field-select',onchange:function(e){ f.group=e.target.value||null; }},[
        el('option',{value:'',selected:!f.group},['Commune (Union + Baptiste)']),
        el('option',{value:'UNION',selected:f.group==='UNION'},['UNION uniquement']),
        el('option',{value:'BAPTISTE',selected:f.group==='BAPTISTE'},['BAPTISTE uniquement'])
      ]);
      return el('div',{class:'overlay',onclick:function(e){ if(e.target.classList.contains('overlay')) closeRubriqueForm(); }},[
        el('div',{class:'modal'},[
          el('h2',{},[isNew?'Créer une rubrique':'Modifier la rubrique']),
          el('p',{},['La rubrique apparaîtra sur chaque dimanche du planning.']),
          el('label',{class:'field-label'},['Nom de la rubrique']),
          el('input',{type:'text',placeholder:'Ex. Louange, Sonorisation…',value:f.label||'',oninput:function(e){ f.label=e.target.value; }}),
          el('label',{class:'field-label'},['Groupe']),groupSelect,
          el('label',{class:'perm-row',style:'margin-top:10px;'},[
            el('input',{type:'checkbox',checked:!!f.scOnly,onchange:function(e){ f.scOnly=e.target.checked; }}),
            el('span',{},['Uniquement les dimanches de Sainte-Cène'])
          ]),
          el('div',{class:'modal-actions'},[
            el('button',{class:'pill-btn ghost',onclick:closeRubriqueForm},['Annuler']),
            el('button',{class:'pill-btn admin',onclick:saveRubriqueForm},[isNew?'Créer':'Enregistrer'])
          ])
        ])
      ]);
    }
    var rows=(state.customRubriques||[]).map(function(r,idx){
      return el('div',{class:'rubrique-row'},[
        el('div',{},[
          el('div',{class:'rubrique-info'},[r.label]),
          el('div',{class:'rubrique-meta'},[(r.group||'Commune')+(r.scOnly?' · Sainte-Cène uniquement':'')])
        ]),
        el('div',{style:'display:flex;gap:6px;'},[
          el('button',{class:'pill-btn ghost small',onclick:function(){ openEditRubriqueForm(idx); }},['Modifier']),
          el('button',{class:'pill-btn danger small',onclick:function(){ if(confirm('Supprimer "'+r.label+'" ?')){ deleteRubrique(idx); } }},['Supprimer'])
        ])
      ]);
    });
    return el('div',{class:'overlay',onclick:function(e){ if(e.target.classList.contains('overlay')){ state.showManageRubriques=false; render(); } }},[
      el('div',{class:'modal modal-wide'},[
        el('div',{class:'modal-header-row'},[el('h2',{},['Gérer les rubriques']),el('button',{class:'pill-btn admin small',onclick:openNewRubriqueForm},['+ Nouvelle rubrique'])]),
        el('p',{},['Créez des rubriques supplémentaires (Louange, Sonorisation…). Elles apparaissent immédiatement dans tous les dimanches.']),
        rows.length?el('div',{class:'rubrique-list'},rows):el('p',{style:'color:var(--ink-soft);font-style:italic;'},['Aucune rubrique personnalisée.']),
        el('div',{class:'modal-actions'},[el('button',{class:'pill-btn',onclick:function(){ state.showManageRubriques=false; render(); }},['Fermer'])])
      ])
    ]);
  }

  function renderToast(){ if(!state.toast) return null; return el('div',{class:'toast'},[state.toast]); }

  function renderHelpModal(){
    if(!state.showHelp) return null;
    var isAdmin=state.helpTab==='admin';

    var tabIntervenants=el('button',{
      class:'pill-btn small'+(state.helpTab==='intervenants'?' admin':'  ghost'),
      onclick:function(){ state.helpTab='intervenants'; render(); }
    },['Intervenants']);
    var tabAdmin=el('button',{
      class:'pill-btn small'+(state.helpTab==='admin'?' admin':' ghost'),
      onclick:function(){ state.helpTab='admin'; render(); }
    },['Administrateurs']);

    function section(title, items){
      return el('div',{style:'margin-bottom:16px;'},[
        el('p',{style:'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:0 0 8px;'},[title]),
        el('div',{style:'display:flex;flex-direction:column;gap:5px;'},
          items.map(function(item){
            return el('div',{style:'display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:var(--cream);border-radius:10px;'},[
              el('span',{style:'font-size:14px;flex:none;'},[item[0]]),
              el('p',{style:'margin:0;font-size:13px;color:var(--ink);line-height:1.5;'},[item[1]])
            ]);
          })
        )
      ]);
    }

    var content;
    if(!isAdmin){
      content = el('div',{},[
        section('Se connecter',[
          ['👤','Dans la barre « Qui êtes-vous ? » en haut de page, choisissez votre nom. Il reste affiché en permanence pendant que vous naviguez.'],
          ['📅','Cliquez sur un mois dans la barre de navigation pour y accéder directement.']
        ]),
        section('S\'inscrire',[
          ['✅','Sur le dimanche souhaité, cliquez sur « Je m\'inscris » en face de la rubrique voulue.'],
          ['🔒','Une case déjà prise par quelqu\'un d\'autre est verrouillée — vous ne pouvez pas la modifier.'],
          ['↩️','Vous pouvez retirer votre propre inscription en cliquant sur « Retirer mon inscription ».'],
          ['📋','Une remarque sous la date signale une information particulière pour ce dimanche.']
        ]),
        section('Bon à savoir',[
          ['👁️','Vous ne voyez actifs que les rubriques pour lesquelles vous êtes habilité(e).'],
          ['🔄','Les inscriptions sont visibles en temps réel par tous les intervenants.'],
          ['🚫','Pas de mot de passe — choisissez simplement votre nom dans la liste.']
        ])
      ]);
    } else {
      content = el('div',{},[
        section('Accès admin',[
          ['🔐','Cliquez sur « Administrateur » en haut à droite, saisissez le code, puis validez. Le bandeau bleu foncé confirme l\'accès.'],
          ['🚪','Cliquez sur « Quitter admin » pour revenir au mode normal.']
        ]),
        section('Sur chaque dimanche',[
          ['✏️','Modifiez ou videz n\'importe quelle case via le menu déroulant.'],
          ['🙋','Pour inscrire un invité, choisissez « Invité… » dans le menu et saisissez son nom — la remarque est créée automatiquement.'],
          ['📋','Ajoutez ou modifiez une remarque visible par tous via le bouton « + Ajouter une remarque ».'],
          ['✝️','Activez ou désactivez la Sainte-Cène sur un dimanche précis (bouton + SC / ✗ SC), sans affecter les autres dimanches.']
        ]),
        section('Gérer les intervenants',[
          ['➕','Bouton « Intervenants » → ajoutez, modifiez les habilitations ou supprimez un intervenant.'],
          ['🗑️','La suppression retire la personne de la liste mais conserve toutes ses inscriptions passées. Elle peut être restaurée.']
        ]),
        section('Gérer les rubriques',[
          ['📌','Bouton « Rubriques » → créez de nouvelles rubriques (Louange, Sonorisation…). Elles apparaissent immédiatement dans tous les dimanches.'],
          ['🔧','Vous pouvez choisir si une rubrique est commune aux deux groupes ou réservée à UNION/BAPTISTE, et si elle s\'affiche uniquement les dimanches de Sainte-Cène.']
        ])
      ]);
    }

    return el('div',{class:'overlay',onclick:function(e){ if(e.target.classList.contains('overlay')){ state.showHelp=false; render(); } }},[
      el('div',{class:'modal modal-wide'},[
        el('div',{class:'modal-header-row'},[
          el('h2',{},['Guide d\'utilisation']),
          el('button',{class:'pill-btn ghost small',onclick:function(){ state.showHelp=false; render(); }},['Fermer'])
        ]),
        el('div',{style:'display:flex;gap:6px;margin-bottom:16px;'},[tabIntervenants,tabAdmin]),
        content
      ])
    ]);
  }

  function render(){
    var root=document.getElementById('root'); root.innerHTML='';
    root.appendChild(renderTopbar());
    if(state.configMissing){
      root.appendChild(el('div',{class:'empty-state'},[el('div',{class:'display'},['Connexion à la base de données impossible']),el('p',{style:'max-width:420px;margin:10px auto 0;font-size:13px;line-height:1.6;'},['Vérifiez la configuration Firebase et votre connexion réseau, puis rechargez la page.'])]));
      return;
    }
    root.appendChild(renderIdentityBar());
    root.appendChild(renderMonthNav());
    if(state.loading){
      root.appendChild(el('div',{class:'empty-state'},[el('div',{class:'display'},['Chargement du planning…'])]));
    } else {
      root.appendChild(renderMain());
      root.appendChild(el('div',{class:'footer-note'},['Les inscriptions sont synchronisées en temps réel. Chacun peut retirer sa propre inscription ; l\u2019administrateur peut tout modifier.']));
    }
    [renderAdminLoginModal(),renderManageIntervenantsModal(),renderManageRubriquesModal(),renderGuestModal(),renderRemarqueModal(),renderHelpModal(),renderToast()]
      .forEach(function(m){ if(m) root.appendChild(m); });
  }

  function bootstrapApp(){
    if(window.__FIREBASE_CONFIG_MISSING__){ state.loading=false; state.configMissing=true; render(); return; }
    render(); loadOverrides();
  }
  var bootstrapped=false;
  function bootstrapOnce(){ if(bootstrapped) return; bootstrapped=true; bootstrapApp(); }
  if(window.__FIREBASE_READY__||window.__FIREBASE_CONFIG_MISSING__){ bootstrapOnce(); }
  else { window.addEventListener('firebase-ready',bootstrapOnce,{once:true}); setTimeout(function(){ if(!bootstrapped){ window.__FIREBASE_CONFIG_MISSING__=true; bootstrapOnce(); } },4000); }
})();
</script>
</body>
</html>
