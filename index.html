<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Planning des cultes 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ── Palette Notion × Google Workspace ── */
    --page-bg:#FAFAF8;
    --white:#FFFFFF;
    --hover-bg:#F2F2EF;
    --ink:#111110;
    --ink-soft:#4A4A42;
    --ink-faint:#9B9B93;
    --line:#D8D8D4;
    --line-strong:#D1D1CE;
    --action:#2383E2;
    --action-pale:#EBF3FD;
    --planning-accent:#4A6FA5;  /* bleu ardoise — Planning */
    --planning-pale:#EBF0F7;
    --danger:#EB4A3F;
    --warn-bg:#FFF8E7;
    --radius:10px;
    --radius-lg:14px;
    --shadow:0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg:0 4px 24px rgba(0,0,0,.09);
    /* Aliases compat */
    --cream:var(--page-bg);
    --cream-deep:#EFEFEB;
    --denim:var(--planning-accent);
    --denim-deep:#3A5A8A;
    --denim-pale:var(--planning-pale);
    --terracotta:var(--danger);
    --terracotta-pale:#FDE8E7;
    --sage:#5B8A6F;
    --sage-pale:#EBF2EE;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--page-bg);color:var(--ink);}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Source Sans 3', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}

  h1,h2,h3,.display{
    font-weight:700;
    letter-spacing:-0.01em;
    color:var(--ink);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:var(--white);
    border-bottom:1px solid var(--line);
    padding:10px 18px;
    display:flex; align-items:center; gap:12px;
  }
  .brand{display:flex; align-items:baseline; gap:10px; min-width:0;}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;
    background:var(--planning-accent);
    display:flex;align-items:center;justify-content:center;
    color:white;font-size:17px;font-weight:700;flex-shrink:0;
    box-shadow:0 1px 3px rgba(74,111,165,.25);
  }
  .brand-text{display:flex;flex-direction:column;min-width:0;}
  .brand-text .t1{font-weight:700;font-size:15px;line-height:1.15;color:var(--ink);}
  .brand-text .t2{font-size:11px;color:var(--ink-soft);}
  .topbar-actions{display:flex;align-items:center;gap:8px;flex:none;}

  .pill-btn{
    font-family:inherit; font-size:13px; font-weight:500;
    padding:6px 14px; border-radius:8px; border:none; cursor:pointer;
    background:var(--hover-bg); color:var(--ink);
    transition:background .12s; white-space:nowrap;
  }
  .pill-btn:hover{box-shadow:var(--shadow); transform:translateY(-1px);}
  .pill-btn:active{transform:translateY(0);}
  .pill-btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .pill-btn.admin{background:var(--planning-accent);color:white;}
  .pill-btn.admin:hover{background:var(--denim-deep);}

  /* ---------- Who-am-I bar ---------- */
  .whoami{
    position:sticky; top:64px; z-index:29;
    padding:9px 18px; background:var(--page-bg);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .whoami .label{font-size:13px; color:var(--denim-deep); font-weight:600;}
  select.name-select{
    font-family:inherit; font-size:13px; font-weight:500;
    padding:5px 10px; border-radius:8px; border:1.5px solid var(--planning-accent);
    background:var(--white); color:var(--ink); cursor:pointer; min-width:200px;
  }
  .whoami .you-badge{
    display:inline-flex; align-items:center; gap:8px; background:var(--white);
    border:1px solid var(--line); border-radius:999px; padding:6px 12px 6px 6px;
    font-size:13.5px; font-weight:600; color:var(--denim-deep);
  }
  .you-badge .avatar{
    width:24px;height:24px;border-radius:50%;background:var(--denim);color:var(--cream);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  }
  .you-badge button{
    border:none;background:transparent;color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;
  }

  /* ---------- Main scroll area ---------- */
  .main{flex:1; padding:18px 16px 90px; max-width:920px; margin:0 auto; width:100%;}

  .legend-row{
    display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px; padding:0 2px;
  }
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .month-header{
    font-size:22px; font-weight:700; color:var(--denim-deep);
    margin:30px 0 12px; padding-top:6px; display:flex; align-items:baseline; gap:10px;
  }
  .month-header:first-child{margin-top:4px;}
  .month-header .count{font-family:'Source Sans 3',sans-serif; font-size:12.5px; font-weight:600; color:var(--ink-soft); background:var(--cream-deep); padding:3px 9px; border-radius:999px;}

  /* ---------- Sunday Card ---------- */
  .card{
    background:var(--white); border-radius:var(--radius-lg); border:1px solid var(--line);
    margin-bottom:16px; overflow:hidden; box-shadow:var(--shadow);
    transition:box-shadow .15s;
  }
  .card .stripe{width:4px; flex:none;}
  .stripe.sc{background:var(--terracotta);}
  .stripe.normal{background:var(--denim);}
  .stripe.dej{background:var(--sage);}
  .card-body{padding:0 14px 14px;}

  .card-top{
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    padding:14px 16px 10px;
  }
  .date-block{display:flex; flex-direction:column;}
  .date-main{font-size:17px;font-weight:700;color:var(--ink);line-height:1.1;}
  .date-sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .type-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:5px;}
  .type-badge.sc{background:var(--terracotta-pale); color:#8C3F1F;}
  .type-badge.dej{background:var(--sage-pale); color:#3E4F37;}
  .type-badge.normal{background:var(--denim-pale); color:var(--denim-deep);}

  .remark{
    font-size:12px; color:var(--ink-soft); font-style:italic;
    padding:6px 12px; margin:0 14px 10px;
    background:var(--hover-bg); border-radius:6px;
    border-left:2px solid var(--planning-accent);
  }

  .slots{display:flex; flex-direction:column; gap:7px;}
  .slot-group-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);padding:8px 0 4px;margin-top:4px;}
  .slot-group-title:first-child{margin-top:0;}

  .slot{
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    border-radius:8px; background:var(--page-bg); border:1px solid transparent;
    transition:background .1s,border-color .1s;
  }
  .slot .slot-label{flex:1;min-width:0;font-size:13px;color:var(--ink);font-weight:500;}
  .slot .slot-value{font-size:13px;font-weight:600;color:var(--ink);}
  .slot.empty .slot-value{color:#B7AE9C; font-weight:500; font-style:italic;}
  .slot.locked{background:var(--cream-deep);}
  .slot.mine{background:var(--denim-pale); border-color:var(--denim);}

  .slot-action{flex:none;}
  .btn-take{
    font-family:inherit; font-size:12px; font-weight:600; border-radius:7px;
    padding:5px 12px; border:1.5px solid var(--planning-accent);
    background:var(--planning-pale); color:var(--planning-accent); cursor:pointer;
    transition:background .1s,color .1s;
  }
  .btn-take:hover{background:var(--planning-accent);color:white;}
  .btn-take:hover{background:var(--denim); color:var(--cream);}
  .btn-take:disabled{opacity:.35; cursor:not-allowed; border-color:var(--line); color:var(--ink-soft);}
  .btn-clear{
    font-family:inherit; font-size:11.5px; font-weight:600; border-radius:7px;
    padding:4px 10px; border:1.5px solid var(--danger);
    background:transparent; color:var(--danger); cursor:pointer;
    transition:background .1s,color .1s;
  }
  .btn-clear:hover{background:var(--danger);color:white;}
  .btn-clear:hover{background:var(--terracotta); color:var(--white);}
  .lock-icon{font-size:13px; color:var(--ink-soft); flex:none;}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }
  .empty-state .display{font-size:20px; margin-bottom:6px;}

  /* ---------- Admin modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
  .modal{
    background:var(--white); border-radius:var(--radius-lg); max-width:440px; width:100%;
    padding:24px; box-shadow:var(--shadow-lg);
    max-height:90vh; overflow-y:auto;
  }
  .modal h2{font-size:20px; margin:0 0 6px;}
  .modal p{font-size:13.5px; color:var(--ink-soft); margin:0 0 16px; line-height:1.5;}
  .modal input{
    width:100%; font-family:inherit; font-size:15px; padding:11px 13px; border-radius:10px;
    border:1.5px solid var(--line); margin-bottom:12px; background:var(--cream);
  }
  .modal input:focus{outline:none; border-color:var(--denim);}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:6px;}
  .err-msg{font-size:12.5px; color:var(--terracotta); margin:-6px 0 10px; font-weight:600;}

  .modal-wide{max-width:520px;}
  .modal-header-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:6px;}
  .modal-header-row h2{margin:0;}
  .pill-btn.small{padding:6px 12px; font-size:12.5px;}

  .field-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:5px;}
  .field-label:first-of-type{margin-top:4px;}

  .perm-list{display:flex; flex-direction:column; gap:8px; margin-bottom:6px;}
  .perm-row{display:flex; align-items:center; gap:10px; font-size:14px; color:var(--ink); cursor:pointer; padding:4px 0;}
  .perm-row input{width:auto; margin:0; accent-color:var(--denim); flex:none; width:17px; height:17px;}

  .person-list{max-height:50vh; overflow-y:auto; display:flex; flex-direction:column; gap:6px; margin:4px 0 16px; padding-right:2px;}
  .person-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 12px; border-radius:10px; background:var(--cream); border:1px solid var(--line);
  }
  .person-name{font-weight:700; font-size:14px; color:var(--ink);}
  .person-meta{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}

  /* admin panel content reuses slot but with select */
  .admin-banner{
    background:var(--planning-accent); color:white; padding:8px 18px;
    font-size:13px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  }
  .admin-banner b{font-weight:700;}
  select.admin-select{
    font-family:inherit; font-size:13px; padding:5px 8px; border-radius:8px; border:1px solid var(--line);
    background:var(--white); max-width:160px;
  }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--cream); padding:11px 20px; border-radius:999px;
    font-size:13.5px; font-weight:600; z-index:80; box-shadow:0 10px 30px -8px rgba(0,0,0,.4);
    animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);}}

  .footer-note{text-align:center;padding:16px;font-size:12px;color:var(--ink-faint);border-top:1px solid var(--line);background:var(--white);}

  @media (max-width:480px){
    .slot{flex-wrap:wrap;}
    .slot .slot-label{width:100%;}
    .brand-text .t2{display:none;}
  }

  /* ---- Barre navigation mois ---- */
  .month-nav{
    background:var(--white);border-bottom:1px solid var(--line);
    padding:6px 16px;overflow-x:auto;white-space:nowrap;
    display:flex;gap:4px;align-items:center;scrollbar-width:none;
    position:sticky;top:110px;z-index:27;
  }
  .month-nav::-webkit-scrollbar{display:none;}
  .month-nav-btn{
    font-family:inherit;font-size:13px;font-weight:500;
    padding:5px 12px;border-radius:6px;border:none;
    background:transparent;color:var(--ink-soft);cursor:pointer;
    transition:background .1s,color .1s;
  }
  .month-nav-btn:hover{background:var(--hover-bg);color:var(--ink);}
  .month-nav-btn.active{background:var(--pill-active,#2F2F2C);color:white;font-weight:600;}
  .month-nav-btn:hover{ background:var(--denim-pale); color:var(--denim-deep); border-color:var(--denim); }
  .month-anchor{ display:block; height:0; overflow:hidden; }


  .remark-admin{font-size:12px;color:var(--denim-deep);background:var(--denim-pale);border-radius:8px;padding:5px 10px;margin-bottom:9px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .rubrique-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
  .rubrique-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:9px;background:var(--cream);border:1px solid var(--line);}
  .rubrique-info{font-size:13px;font-weight:600;color:var(--ink);}
  .rubrique-meta{font-size:11px;color:var(--ink-soft);}
  .pill-btn.danger{background:#C0392B;border-color:#C0392B;color:#fff;}


  /* ── Message smartphone paysage ── */
  .landscape-hint{
    display:none;
    background:var(--warn-bg);border-bottom:1px solid #F5DEB3;
    padding:8px 16px;font-size:12.5px;color:#92400E;
    align-items:center;gap:8px;
  }
  .landscape-hint-close{
    margin-left:auto;background:none;border:none;cursor:pointer;
    font-size:16px;color:#92400E;padding:2px 6px;
  }
  @media(max-width:600px){ .landscape-hint{display:flex;} }

  /* ── Slots locked/mine ── */
  .slot.locked{background:var(--hover-bg);}
  .slot.mine{background:var(--planning-pale);border-color:var(--planning-accent);}
  .lock-icon{font-size:14px;flex-shrink:0;opacity:.5;}

  /* ── SC badge ── */
  .type-badge.sc{background:var(--planning-pale);color:var(--planning-accent);}
  .type-badge.normal{background:var(--hover-bg);color:var(--ink-soft);}

  /* ── Scrollbar mois ── */
  .month-nav::-webkit-scrollbar{display:none;}


  /* ── Accueil / Sécurité ── */
  .slot-accueil{ padding:10px 12px; border-radius:8px; background:var(--hover-bg); overflow:hidden; }
  .slot-accueil-header{
    display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
  }
  .accueil-equipe-badge{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    background:var(--planning-accent); color:white; padding:2px 8px; border-radius:5px;
    white-space:nowrap; flex-shrink:0;
  }
  .accueil-membres{ display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
  .accueil-membre{
    font-size:12px; padding:3px 8px; border-radius:5px;
    background:var(--planning-pale); color:var(--planning-accent); font-weight:500;
  }
  .accueil-membre-resp{
    font-size:12px; padding:3px 8px; border-radius:5px;
    background:var(--planning-accent); color:white; font-weight:600;
  }

  .accueil-chip{ display:flex; align-items:center; gap:5px; }
  .accueil-btn-absent{
    font-family:inherit; font-size:10px; font-weight:600;
    padding:2px 7px; border-radius:5px; border:1px solid var(--danger);
    background:transparent; color:var(--danger); cursor:pointer;
  }
  .accueil-btn-absent:hover{ background:var(--danger); color:white; }
  .accueil-remplacant{ background:#FFF3CD; color:#856404; }

  .accueil-absent{ background:#FDE8E7; color:#C0392B; text-decoration:line-through; }
  .accueil-btn-ok{
    font-family:inherit; font-size:10px; font-weight:600;
    padding:2px 7px; border-radius:5px; border:1.5px solid #2D7A4F;
    background:transparent; color:#2D7A4F; cursor:pointer;
  }
  .accueil-btn-ok:hover{ background:#2D7A4F; color:white; }
</style>

  var PERM_FIELDS_BASE = ['predication','presidenceCulte','presidenceSainteCene','distributionSainteCene','collecteOffrandes','accueilSecurite'];
  // PERM_FIELDS est dynamique — inclut les rubriques personnalisées
  function rubriquePerm(r){
    // Garantit un perm valide même pour les rubriques créées avant
    if(r.perm && r.perm.trim()) return r.perm;
    return (r.label||'').toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_');
  }
  function getPermFields(){
    // Retourne la liste des clés d'habilitation (sans manipuler defByKey ni groups)
    var fields = PERM_FIELDS_BASE.slice();
    (state.customRubriques||[]).forEach(function(r){
      var p = rubriquePerm(r);
      if(p && fields.indexOf(p) < 0) fields.push(p);
    });
    return fields;
  }
  function getPermLabels(){
    var labels = {
      predication:'Prédicateur',
      presidenceCulte:'Président du culte',
      presidenceSainteCene:'Président Sainte-Cène',
      distributionSainteCene:'Distribution Sainte-Cène',
      collecteOffrandes:'Collecte offrandes',
      accueilSecurite:'Accueil / Sécurité'
    };
    (state.customRubriques||[]).forEach(function(r){
      labels[rubriquePerm(r)] = r.label;
    });
    return labels;
  }
  // Compat : PERM_FIELDS et PERM_LABELS pour le code existant
  var PERM_FIELDS = PERM_FIELDS_BASE;

  // intervenantsOverrides: nom -> objet intervenant complet (ajout ou remplacement d'une personne de la base)
  function getEffectiveIntervenants(){
    var byNomBase = {};
    INTERVENANTS_BASE.forEach(function(p){ byNomBase[p.nom] = p; });
    var overrides = state.intervenantsOverrides || {};
    Object.keys(overrides).forEach(function(nom){
      if(nom.indexOf('__deleted__') === 0){
        var orig = nom.slice('__deleted__'.length);
        delete byNomBase[orig];
      } else if(overrides[nom] && overrides[nom].__deleted){
        // ignorer — ne pas ajouter à la liste
      } else if(overrides[nom] && overrides[nom].nom){
        byNomBase[nom] = overrides[nom];
      }
    });
    // Filtrer les entrées sans nom valide + dédupliquer (insensible casse)
    var result = [];
    var seen = {};
    Object.keys(byNomBase).forEach(function(nom){
      var p = byNomBase[nom];
      if(!p || !p.nom || typeof p.nom !== 'string') return;
      var key = p.nom.toLowerCase().replace(/\s+/g,' ').trim();
      if(seen[key]) return; // doublon (ex: Joseph SOKPO vs Joseph SOKPO)
      seen[key] = true;
      result.push(p);
    });
    result.sort(function(a,b){ return a.nom.localeCompare(b.nom,'fr',{sensitivity:'base'}); });
    return result;
  }

  function getNamesSorted(){
    return getEffectiveIntervenants().map(function(p){return p.nom;}).sort(function(a,b){
      return a.localeCompare(b, 'fr', {sensitivity:'base'});
    });
  }

  function byName(nom){
    var list = getEffectiveIntervenants();
    for(var i=0;i<list.length;i++){ if(list[i].nom===nom) return list[i]; }
    return null;

    return Object.assign({},row,{hasSainteCene:hasSC,typeCulte:hasSC?'Sainte-Cène':row.typeCulte});
  }
  function getSlotDefs(row){
    var defs=[
      {key:'predicateur',label:'Prédicateur',perm:'predication',group:null},
      {key:'presidentCulte',label:'Président du culte',perm:'presidenceCulte',group:null}
    ];
    if(row.hasSainteCene){
      defs.push({key:'presidentSainteCene',label:'Président Sainte-Cène',perm:'presidenceSainteCene',group:null,scOnly:true});
      ['unionDist1','unionDist2'].forEach(function(k,i){ defs.push({key:k,label:'Distributeur SC '+(i+1),perm:'distributionSainteCene',group:'UNION',scOnly:true}); });
      ['baptisteDist1','baptisteDist2'].forEach(function(k,i){ defs.push({key:k,label:'Distributeur SC '+(i+1),perm:'distributionSainteCene',group:'BAPTISTE',scOnly:true}); });
    }
    ['unionCollecte1','unionCollecte2'].forEach(function(k,i){ defs.push({key:k,label:'Collecte offrandes '+(i+1),perm:'collecteOffrandes',group:'UNION'}); });
    ['baptisteCollecte1','baptisteCollecte2'].forEach(function(k,i){ defs.push({key:k,label:'Collecte offrandes '+(i+1),perm:'collecteOffrandes',group:'BAPTISTE'}); });
    (state.customRubriques||[]).forEach(function(r){
      if(r.scOnly&&!row.hasSainteCene) return;
      var n = r.nbPlaces || 2;
      var rperm = rubriquePerm(r);
      for(var i=1;i<=n;i++){
        defs.push({key:r.key+'_'+i,label:r.label+' '+i,perm:rperm,group:r.group||null,scOnly:!!r.scOnly});
      }
    });
    // Accueil / Sécurité — rubrique spéciale informatif
    defs.push({key:'accueil_securite',label:'Accueil / Sécurité',
      perm:'accueil_securite',group:'ACCUEIL',special:'accueil',scOnly:false});
    return defs;
  }

  var SLOT_DEFS = [

  function dateFR(iso){
    var d = new Date(iso+"T00:00:00");
    var days = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    var months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    return {
      dayLabel: days[d.getDay()],
      full: d.getDate()+' '+months[d.getMonth()],
      year: d.getFullYear()
    };
  }

    if(row.typeCulte === 'Sainte-Cène') return {cls:'sc', label:'Sainte-Cène'};
    if(row.typeCulte === 'Petit-déjeuner') return {cls:'dej', label:'Petit-déjeuner'};

    showManageRubriques: false, manageRubriqueEditing: null, manageRubriqueForm: null,
    showGuestModal: false, guestTarget: null, guestName: '',
    showRemarqueModal: false, remarqueTarget: null, remarqueText: '',
    showHelp: false, helpTab: 'intervenants'
  };

  // =========================================================
  // PERSISTENCE (Firebase Firestore)
  // =========================================================
  // Document unique pour les inscriptions, document unique pour les intervenants ajoutés/modifiés.
  // Initialisés à l'intérieur de loadOverrides() pour garantir que le SDK Firebase
  // (chargé en module, donc de façon asynchrone) est bien prêt avant utilisation.
  var db, fsDoc, fsOnSnapshot, fsSetDoc, OVERRIDES_DOC, INTERVENANTS_DOC, CONFIG_DOC;

  function loadOverrides(){
    db = window.__FIRESTORE_DB__;
    fsDoc = window.__FIRESTORE_DOC__;
    fsOnSnapshot = window.__FIRESTORE_ON_SNAPSHOT__;
    fsSetDoc = window.__FIRESTORE_SET_DOC__;
    OVERRIDES_DOC = fsDoc(db, 'planning_culte_2026', 'overrides');
    INTERVENANTS_DOC = fsDoc(db, 'planning_culte_2026', 'intervenants');
    CONFIG_DOC = fsDoc(db, 'planning_culte_2026', 'config');

    // Écoute en temps réel : toute modification faite par quelqu'un d'autre
    // met à jour l'écran de tout le monde automatiquement, sans recharger la page.
    fsOnSnapshot(OVERRIDES_DOC, function(snap){
      state.overrides = (snap.exists() && snap.data() && snap.data().value) ? JSON.parse(snap.data().value) : {};
      state.loading = false;
      render();
    }, function(err){
      console.error(err);
      state.loading = false;
      showToast("Connexion à la base de données impossible.");
      render();
    });

    fsOnSnapshot(INTERVENANTS_DOC, function(snap){
      state.intervenantsOverrides = (snap.exists() && snap.data() && snap.data().value) ? JSON.parse(snap.data().value) : {};
      render();
    }, function(err){ console.error(err); });

    fsOnSnapshot(CONFIG_DOC, function(snap){
      var cfg = (snap.exists()&&snap.data()&&snap.data().value) ? JSON.parse(snap.data().value) : {};
      state.customRubriques = cfg.rubriques || [];
      state.scOverrides = cfg.scOverrides || {};
      render();
    }, function(){});
  }

  async function saveConfig(){
    try{ await fsSetDoc(CONFIG_DOC,{value:JSON.stringify({rubriques:state.customRubriques,scOverrides:state.scOverrides})}); }
    catch(e){ console.error(e); showToast('Connexion impossible.'); }
  }

  async function saveOverrides(){
    try{
      await fsSetDoc(OVERRIDES_DOC, { value: JSON.stringify(state.overrides) });
    }catch(e){
      console.error(e);
      showToast("Connexion impossible, réessayez.");
    }
  }

  async function saveIntervenantsOverrides(){
    try{
      await fsSetDoc(INTERVENANTS_DOC, { value: JSON.stringify(state.intervenantsOverrides) });
    }catch(e){
      console.error(e);
      showToast("Connexion impossible, réessayez.");
    }
  }

  function getEffectiveValue(row, fieldKey){
    var ov = state.overrides[row.id];
    if(ov && Object.prototype.hasOwnProperty.call(ov, fieldKey)){
      return ov[fieldKey]; // could be null meaning cleared
    }
    return row[fieldKey];
  }

  // =========================================================
  // ACTIONS
  // =========================================================
  function adminSetRemarque(rowId,texte){
    if(!state.overrides[rowId]) state.overrides[rowId]={};
    state.overrides[rowId].__remarque=texte||null;
    saveOverrides(); showToast("Remarque enregistrée.");

    state.scOverrides[rowId]=!cur; saveConfig();
    showToast(!cur?"Sainte-Cène activée.":"Sainte-Cène retirée."); render();

  function deletePerson(nom){
    var p=byName(nom)||{};
    if(!state.intervenantsOverrides) state.intervenantsOverrides={};

    if(state.intervenantsOverrides&&state.intervenantsOverrides[nom]){

  function savePersonForm(){
    var f = state.manageForm;
    var nom = (f.nom || '').trim();
    if(!nom){ showToast("Merci de saisir un nom."); return; }
    var isNew = state.managePersonEditing === '__new__';
    if(isNew && byName(nom)){ showToast("Ce nom existe déjà dans la liste."); return; }

    var nomOriginal = f.nomOriginal || nom;
    var nomChange = !isNew && nom !== nomOriginal;
    if(nomChange && byName(nom)){ showToast("Ce nom existe déjà — choisissez un nom différent."); return; }

    var record = { nom: nom, groupe: f.groupe, email: (f.email||'').trim() };
    getPermFields().forEach(function(field){ record[field] = !!f[field]; });

    if(!state.intervenantsOverrides) state.intervenantsOverrides = {};

    var countMigrated = 0;
    if(nomChange){
      delete state.intervenantsOverrides[nomOriginal];
      state.intervenantsOverrides['__deleted__' + nomOriginal] = { __deleted: true, nom: nomOriginal };
      Object.keys(state.overrides).forEach(function(rowId){
        var row = state.overrides[rowId]; if(!row) return;
        Object.keys(row).forEach(function(k){
          if(row[k] === nomOriginal){ row[k] = nom; countMigrated++; }
        });
      });
      if(countMigrated > 0) saveOverrides();
    }

    state.intervenantsOverrides[nom] = record;
    saveIntervenantsOverrides();

    if(isNew) showToast("Intervenant ajouté.");
    else if(nomChange) showToast("Nom corrigé" + (countMigrated > 0 ? " — " + countMigrated + " inscription(s) mise(s) à jour." : " — aucune inscription à migrer."));
    else showToast("Habilitations mises à jour.");
    closePersonForm();
  }

  // RENDER HELPERS
  // =========================================================
  function el(tag, attrs, children){
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function(k){
      var v = attrs[k];
      if(k === 'class') node.className = v;
      else if(k === 'html') node.innerHTML = v;
      else if(k.indexOf('on') === 0 && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if(k === 'disabled') { if(v) node.setAttribute('disabled','disabled'); }
      else if(k === 'checked') { node.checked = !!v; if(v) node.setAttribute('checked','checked'); }
      else if(k === 'selected') { if(v){ node.selected = true; node.setAttribute('selected','selected'); } }
      else if(k === 'style') node.setAttribute('style', v);
      else if(v == null) { /* skip null/undefined attrs */ }
      else node.setAttribute(k, v);
    });
    (children||[]).forEach(function(c){
      if(c == null) return;
      if(typeof c === 'string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    });
    return node;
  }

  function slotEligible(person, slotDef){
    if(slotDef.special === 'accueil') return true;  // Accueil : visible pour tous
    if(!person) return false;
    if(!person[slotDef.perm]) return false;
    // Pour les rubriques de distribution/collecte (propres à chaque église),
    // l'intervenant doit appartenir au même groupe (UNION ou BAPTISTE).
    // Prédicateur / Président du culte / Président Sainte-Cène restent communs.
    if(slotDef.group && person.groupe !== slotDef.group) return false;
    return true;
  }

  function renderSlot(row, def){
    // Cas spécial : Accueil / Sécurité
    if(def.special === 'accueil'){
      var dateISO = row.date;
      var rowId = row.id;
      var equipe = getEquipeAccueil(dateISO);
      var equipeAutre = equipe === 'A' ? 'B' : 'A';
      var membres = renderSlotAccueil(dateISO, state.overrides, rowId);
      var ov = (state.overrides && state.overrides[rowId]) ? state.overrides[rowId] : {};
      var absents = ov.accueil_absents || [];
      var remplacants = ov.accueil_remplacants || [];
      var membreBase = ACCUEIL_EQUIPES[equipe];
      var currentUser = state.currentUser;

      // Chips : chaque membre avec boutons selon son statut
      var chips = membres.map(function(m){
        var isResp = m.includes('responsable');
        var isRemplacant = remplacants.indexOf(m) >= 0;
        var estDansEquipe = membreBase.indexOf(m) >= 0;
        var estAbsent = absents.indexOf(m) >= 0;
        // Bouton "Absent" : le membre peut signaler son absence
        var btnAbsent = currentUser && currentUser === m && estDansEquipe && !isResp && !estAbsent
          ? el('button',{
              class:'accueil-btn-absent',
              onclick:(function(nom_){ return function(e){ e.stopPropagation(); toggleAccueilMembre(rowId, dateISO, nom_, 'absent'); }; })(m)
            },['Absent'])
          : null;
        // Bouton "Annuler mon absence" : le membre peut annuler son absence
        var btnAnnulerAbsence = currentUser && currentUser === m && estAbsent
          ? el('button',{
              class:'accueil-btn-ok',
              onclick:(function(nom_){ return function(e){ e.stopPropagation(); toggleAccueilMembre(rowId, dateISO, nom_, 'retablir'); }; })(m)
            },['✓ Je serai là'])
          : null;
        // Admin : bouton pour rétablir un absent
        var btnAdminRetablir = state.isAdmin && estAbsent
          ? el('button',{
              class:'accueil-btn-ok',
              style:'font-size:10px;',
              onclick:(function(nom_){ return function(e){ e.stopPropagation(); toggleAccueilMembre(rowId, dateISO, nom_, 'retablir'); }; })(m)
            },['Rétablir'])
          : null;
        // Bouton "Retirer" : remplaçant peut se retirer
        var btnRetirer = currentUser && currentUser === m && isRemplacant
          ? el('button',{
              class:'accueil-btn-absent',
              onclick:(function(nom_){ return function(e){ e.stopPropagation(); toggleAccueilMembre(rowId, dateISO, nom_, 'retirer'); }; })(m)
            },['Retirer'])
          : null;
        return el('div',{class:'accueil-chip'},[
          el('span',{class:'accueil-membre'+(isResp?'-resp':isRemplacant?' accueil-remplacant':estAbsent?' accueil-absent':'')},[
            m+(isRemplacant?' (remplacement)':estAbsent?' (absent)':'')
          ]),
          btnAbsent, btnAnnulerAbsence, btnAdminRetablir, btnRetirer,
        ]);
      });

      // Bouton disponible : pour membres de l'autre équipe + Philippe/Madeleine PEM
      var membreAutreEquipe = currentUser && ACCUEIL_EQUIPES[equipeAutre].some(function(m){
        return currentUser === m || m.includes(currentUser);
      });
      var estPhilippeMadeleine = currentUser === 'Philippe PEM' || currentUser === 'Madeleine PEM';
      var dejaInscrit = currentUser && remplacants.indexOf(currentUser) >= 0;
      var btnDispo = currentUser && !dejaInscrit && (membreAutreEquipe || estPhilippeMadeleine)
        ? el('button',{
            class:'btn-take', style:'margin-top:6px;font-size:11.5px;',
            onclick:function(e){ e.stopPropagation(); toggleAccueilMembre(rowId, dateISO, currentUser, 'remplacer'); }
          },['Je suis disponible ce dimanche'])
        : null;
      var btnSeRetirer = currentUser && dejaInscrit
        ? el('button',{
            class:'btn-clear', style:'margin-top:6px;font-size:11.5px;',
            onclick:function(e){ e.stopPropagation(); toggleAccueilMembre(rowId, dateISO, currentUser, 'retirer'); }
          },['Me retirer'])
        : null;

      // Section admin : remettre tous les absents / retirer tous les remplaçants
      var adminAccueilBtns = [];
      if(state.isAdmin && (absents.length>0||remplacants.length>0)){
        if(absents.length>0) adminAccueilBtns.push(
          el('button',{
            class:'pill-btn small ghost',style:'margin-top:6px;font-size:11px;',
            onclick:async function(e){ e.stopPropagation();
              // Batch : modifier state puis sauvegarder une seule fois
              if(!state.overrides[rowId]) state.overrides[rowId]={};
              state.overrides[rowId].accueil_absents=[];
              await saveOverrides(); render();
              showToast('Tous les absents ont été rétablis.');
            }
          },['↩ Rétablir tous les absents'])
        );
        if(remplacants.length>0) adminAccueilBtns.push(
          el('button',{
            class:'pill-btn small ghost',style:'margin-top:4px;font-size:11px;',
            onclick:async function(e){ e.stopPropagation();
              if(!state.overrides[rowId]) state.overrides[rowId]={};
              state.overrides[rowId].accueil_remplacants=[];
              await saveOverrides(); render();
              showToast('Tous les remplaçants ont été retirés.');
            }
          },['✕ Retirer tous les remplaçants'])
        );
      }
      return el('div',{class:'slot slot-accueil'},[
        el('div',{class:'slot-accueil-header'},[
          el('span',{class:'slot-label'},['Accueil / Sécurité']),
          el('span',{style:'flex:1;'},[]),
          el('span',{class:'accueil-equipe-badge'},['Équipe '+equipe]),
        ]),
        el('div',{class:'accueil-membres'},chips),
        btnDispo, btnSeRetirer,
      ].concat(adminAccueilBtns));
    }
    var rawVal = row[def.key];
    var jeunesLocked = rawVal === 'Jeunes';
    var value = getEffectiveValue(row, def.key);
    var hasValue = value != null && value !== '' && value !== '-----';
    var mine = hasValue && state.currentUser && value === state.currentUser;

    var slotClasses = 'slot' + (hasValue ? ' locked' : ' empty') + (mine ? ' mine' : '');

    var valueNode = el('span', {class:'slot-value'}, [hasValue ? value : 'À pourvoir']);

    var actionNode;
    if(state.isAdmin){
      var allNames = getNamesSorted();
      var isGuest = hasValue && value.indexOf('Invité') === 0;
      // Valeur "orpheline" : une valeur présente qui ne correspond à aucun intervenant
      // ni au format Invité (ex. "Tadeusz" écrit depuis le Calendrier Staff).
      var isOrphan = hasValue && !isGuest && allNames.indexOf(value) < 0;
      var options = [el('option',{value:''},['— vide —'])];
      // Afficher la valeur orpheline en tête pour que l'admin puisse la voir et reprendre la main
      if(isOrphan){
        var orphanOpt = el('option', {value:value}, [value + ' (saisi via Staff)']);
        orphanOpt.setAttribute('selected','selected');
        options.push(orphanOpt);
      }
      options = options.concat(
        allNames.map(function(n){
          var opt = el('option', {value:n}, [n]);
          if(n === value) opt.setAttribute('selected','selected');
          return opt;
        })
      ).concat([el('option', {value:'__guest__', selected:isGuest}, ['Invité…'])]);
      var sel = el('select', {class:'admin-select', onchange:function(e){
        var v = e.target.value;
        if(v === '__guest__'){
          state.showGuestModal=true;
          state.guestTarget={rowId:row.id,fieldKey:def.key,label:def.label};
          state.guestName=''; render(); return;
        }
        adminSetSlot(row.id, def.key, v);
      }}, options);
      actionNode = sel;
    } else if(jeunesLocked){
      actionNode = el('span', {class:'lock-icon'}, ['🔒']);
    } else if(hasValue && mine){
      // L'intervenant peut retirer sa propre inscription, et personne d'autre.
      actionNode = el('button', {
        class:'btn-clear',
        onclick: function(){ releaseSlot(row.id, def.key, value); }
      }, ['Retirer mon inscription']);
    } else if(hasValue){
      actionNode = el('span', {class:'lock-icon'}, ['🔒']);
    } else {
      var person = state.currentUser ? byName(state.currentUser) : null;
      var eligible = slotEligible(person, def);
      actionNode = el('button', {
        class:'btn-take',
        disabled: !state.currentUser || !eligible,
        title: !state.currentUser ? 'Choisissez votre nom' : (!eligible ? 'Vous n\u2019êtes pas habilité pour cette rubrique' : ''),
        onclick: function(){ takeSlot(row.id, def.key, def.label); }
      }, [state.currentUser && !eligible ? 'Non habilité' : 'Je m\u2019inscris']);
    }

    return el('div', {class:slotClasses}, [
      el('span', {class:'slot-label'}, [def.label]),
      valueNode,
      el('span', {class:'slot-action'}, [actionNode])
    ]);
  }

// ACCUEIL / SÉCURITÉ — Alternance équipes A/B
// ============================================================
var ACCUEIL_EQUIPE_A_START = '2026-06-07';
var ACCUEIL_EQUIPES = {
  A: ['Joseph SOKPO (responsable)', 'Olivier Garbe', 'Judith PEM', 'Émerick GROS-DESORMEAUX'],
  B: ['Joseph SOKPO (responsable)', 'Prosper Momo', 'Naomi', 'Steeve TONDEREAU'],
};

function getEquipeAccueil(dateISO){
  var start = new Date(ACCUEIL_EQUIPE_A_START + 'T00:00:00');
  var cur   = new Date(dateISO + 'T00:00:00');
  var diffWeeks = Math.round((cur - start) / (7 * 86400000));
  return diffWeeks % 2 === 0 ? 'A' : 'B';
}

function renderSlotAccueil(dateISO, overrides, rowId){
  // Retourne TOUS les membres (présents + absents) + remplaçants
  // L'affichage gère ensuite le statut de chacun
  var equipe = getEquipeAccueil(dateISO);
  var membres = ACCUEIL_EQUIPES[equipe].slice();
  var key = rowId || dateISO;
  var ov = (overrides && overrides[key]) ? overrides[key] : {};
  var absents = ov.accueil_absents || [];
  var remplacants = ov.accueil_remplacants || [];
  // Ajouter les remplaçants qui ne sont pas déjà dans la liste
  remplacants.forEach(function(r){ if(membres.indexOf(r)<0) membres.push(r); });
  // NE PAS retirer les absents — ils sont affichés avec un style barré
  return membres;
}

// ── Accueil/Sécurité : gérer absences et remplacements ──────
async function toggleAccueilMembre(rowId, dateISO, nom, action){
  try {
    if(!state.overrides) state.overrides = {};
    if(!state.overrides[rowId]) state.overrides[rowId] = {};
    var ov = state.overrides[rowId];
    var absents = (ov.accueil_absents || []).slice();
    var remplacants = (ov.accueil_remplacants || []).slice();

    if(action === 'absent'){
      if(absents.indexOf(nom) < 0) absents.push(nom);
      showToast('Absence signalée. Merci de prévenir le responsable d\'équipe.');
    } else if(action === 'remplacer'){
      if(remplacants.indexOf(nom) < 0) remplacants.push(nom);
      showToast('Disponibilité enregistrée. Merci pour ton service !');
    } else if(action === 'retablir'){
      absents = absents.filter(function(m){ return m !== nom; });
      showToast('Présence rétablie pour '+nom+'.');
    } else if(action === 'retirer'){
      absents = absents.filter(function(m){ return m !== nom; });
      remplacants = remplacants.filter(function(m){ return m !== nom; });
      showToast('Modification enregistrée.');
    }
    state.overrides[rowId].accueil_absents = absents;
    state.overrides[rowId].accueil_remplacants = remplacants;
    await saveOverrides();
    render();
  } catch(e) {
    showToast('Connexion impossible, réessayez.');
    console.error(e);
  }
}

// EMAILJS — Rappels d'inscription
// ============================================================
var EMAILJS_SERVICE_ID  = 'service_kpo2kbv';
var EMAILJS_TEMPLATE_ID = 'template_vyat5ej';
var EMAILJS_PUBLIC_KEY  = 'ghEB6k_4E3NYX8nJw';
var emailjsReady = false;

function initEmailJS(){
  if(typeof emailjs !== 'undefined'){
    emailjs.init({publicKey: EMAILJS_PUBLIC_KEY});
    emailjsReady = true;
  }
}

// Calculer depuis combien de mois un intervenant ne s'est pas inscrit
function moisSansInscription(nom){
  if(!state.overrides) return 99;
  var dernierDimanche = null;
  Object.keys(state.overrides).forEach(function(rowId){
    var ov = state.overrides[rowId];
    if(!ov) return;
    Object.keys(ov).forEach(function(k){
      if(ov[k] === nom){
        // Trouver la date de ce rowId
        var row = PLANNING_RAW.find(function(r){ return r.id === rowId; });
        if(row && row.date){
          if(!dernierDimanche || row.date > dernierDimanche) dernierDimanche = row.date;
        }
      }
    });
  });
  if(!dernierDimanche) return 99;
  var now = new Date();
  var last = new Date(dernierDimanche + 'T00:00:00');
  return Math.floor((now - last) / (30 * 24 * 3600 * 1000));
}

// Trouver les rubriques non pourvues pour un dimanche donné
function getRubriquesManquantes(rowId){
  var row = PLANNING_RAW.find(function(r){ return r.id === rowId; });
  if(!row) return [];
  var effRow = getRowEffective(row);
  var defs = getSlotDefs(effRow);
  var ov = (state.overrides && state.overrides[rowId]) ? state.overrides[rowId] : {};
  var manquantes = [];
  defs.forEach(function(def){
    if(def.special === 'accueil') return;
    var val = ov[def.key] !== undefined ? ov[def.key] : (effRow[def.key] || null);
    if(!val) manquantes.push(def.label);
  });
  return manquantes;
}

// Envoyer un rappel email à un intervenant
async function envoyerRappelEmail(intervenant, dateDimanche, rowId, rubriques){
  if(!emailjsReady){ showToast('EmailJS non initialisé.'); return false; }
  if(!intervenant.email){ return false; }
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      prenom: intervenant.nom.split(' ')[0],
      date_dimanche: dateDimanche,
      rubriques_manquantes: rubriques.join(' | ')
    });
    return true;
  } catch(e) {
    console.error('EmailJS erreur:', e);
    return false;
  }
}

// Logique principale de rappels — appelée par l'admin
async function lancerRappels(rowId){
  var row = PLANNING_RAW.find(function(r){ return r.id === rowId; });
  if(!row){ showToast('Dimanche introuvable.'); return; }

  var rubriques = getRubriquesManquantes(rowId);
  if(rubriques.length === 0){ showToast('Toutes les rubriques sont pourvues pour ce dimanche ! ✓'); return; }

  var now = new Date();
  var jourSemaine = now.getDay(); // 0=dim, 4=jeu, 5=ven
  var heure = now.getHours();

  // Déterminer le groupe cible selon le calendrier
  // Jeudi matin → absents depuis 2 mois
  // Vendredi matin → absents depuis 1 mois
  // Vendredi soir → tous les non inscrits
  var moisSeuil = 0;
  if(jourSemaine === 4) moisSeuil = 2;           // Jeudi → 2 mois
  else if(jourSemaine === 5 && heure < 12) moisSeuil = 1; // Vendredi matin → 1 mois
  else moisSeuil = 0;                            // Vendredi soir → tous

  // Intervenants habilités non encore inscrits ce dimanche
  var ov = (state.overrides && state.overrides[rowId]) ? state.overrides[rowId] : {};
  var inscrits = new Set(Object.values(ov).filter(function(v){ return v && typeof v === 'string'; }));

  var intervenants = getEffectiveIntervenants().filter(function(p){
    if(!p.email) return false;
    if(inscrits.has(p.nom)) return false; // déjà inscrit
    var mois = moisSansInscription(p.nom);
    return mois >= moisSeuil;
  });

  if(intervenants.length === 0){
    showToast('Aucun destinataire pour ce créneau.');
    return;
  }

  var dateStr = new Date(row.date + 'T00:00:00').toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  var envoyés = 0;
  for(var i=0; i<intervenants.length; i++){
    var ok = await envoyerRappelEmail(intervenants[i], dateStr, rowId, rubriques);
    if(ok) envoyés++;
    await new Promise(function(r){ setTimeout(r, 300); }); // éviter le spam
  }
  showToast('✓ ' + envoyés + ' rappel(s) envoyé(s) sur ' + intervenants.length + ' destinataire(s).');
}


// ============================================================
// MODAL RAPPELS EMAIL
// ============================================================
function renderRappelsModal(){
  if(!state.showRappels) return null;

  // Dimanches à venir non entièrement pourvus
  var now = new Date().toISOString().slice(0,10);
  var dimanchesAPourvoir = PLANNING_RAW.filter(function(row){
    if(row.date < now) return false;
    return getRubriquesManquantes(row.id).length > 0;
  }).slice(0,8);

  var today = new Date();
  var jourSemaine = today.getDay();
  var heure = today.getHours();
  var conseil = '';
  if(jourSemaine===4) conseil = 'Jeudi — envoi aux intervenants absents depuis 2 mois';
  else if(jourSemaine===5 && heure<12) conseil = 'Vendredi matin — envoi aux absents depuis 1 mois';
  else if(jourSemaine===5 && heure>=12) conseil = 'Vendredi soir — envoi à tous les non inscrits';
  else conseil = 'Hors créneau automatique — envoi à tous les non inscrits';

  var overlay = el('div',{class:'overlay',onclick:function(e){
    if(e.target===overlay){ state.showRappels=false; render(); }
  }},[
    el('div',{class:'modal',style:'max-width:520px;'},[
      el('h2',{},['\uD83D\uDCE7 Rappels d\u2019inscription']),
      el('p',{style:'font-size:12px;color:var(--ink-soft);margin:6px 0 14px;'},[conseil]),
      el('div',{class:'field-label',style:'margin-bottom:8px;'},['Choisir le dimanche']),
      dimanchesAPourvoir.length === 0
        ? el('p',{style:'color:var(--green);font-size:13px;'},['✓ Tous les dimanches à venir sont pourvus !'])
        : el('div',{style:'display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;'},
            dimanchesAPourvoir.map(function(row){
              var rubriques = getRubriquesManquantes(row.id);
              var dateStr = new Date(row.date+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
              var isSelected = state.rappelRowId === row.id;
              return el('div',{
                style:'padding:10px 12px;border-radius:8px;cursor:pointer;border:2px solid '+(isSelected?'var(--planning)':'var(--line)')+';background:'+(isSelected?'var(--planning-pale)':'var(--page)'),
                onclick:function(){ state.rappelRowId=row.id; render(); }
              },[
                el('div',{style:'font-weight:600;font-size:13px;color:var(--ink);'},[dateStr]),
                el('div',{style:'font-size:11px;color:var(--ink-soft);margin-top:3px;'},[
                  rubriques.length+' rubrique(s) manquante(s) : '+rubriques.slice(0,3).join(', ')+(rubriques.length>3?'…':'')
                ])
              ]);
            })
          ),
      el('div',{class:'modal-actions',style:'margin-top:16px;'},[
        el('button',{class:'pill-btn ghost',onclick:function(){ state.showRappels=false; render(); }},['Fermer']),
        state.rappelRowId ? el('button',{
          class:'pill-btn admin',
          onclick:async function(){
            await lancerRappels(state.rappelRowId);
            state.showRappels=false; state.rappelRowId=null; render();
          }
        },['Envoyer les rappels →']) : null
      ])
    ])
  ]);
  return overlay;
}


function render(){
    var root = document.getElementById('root');
    root.innerHTML = '';
    var lhp = renderLandscapeHintPlanning(); if(lhp) root.appendChild(lhp);
  var rappelsMod = renderRappelsModal(); if(rappelsMod) root.appendChild(rappelsMod);
    root.appendChild(renderTopbar());

    if(state.configMissing){
      root.appendChild(el('div', {class:'empty-state'}, [
        el('div', {class:'display'}, ['Connexion à la base de données impossible']),
        el('p', {style:'max-width:420px; margin:10px auto 0; font-size:13.5px; line-height:1.6;'}, [
          'Soit ce fichier n\u2019est pas encore relié à un projet Firebase (ouvrez le fichier dans un éditeur de texte et complétez le bloc "CONFIGURATION FIREBASE"), soit la connexion réseau a échoué. Vérifiez votre connexion et rechargez la page.'
        ])
      ]));
      return;
    }

    root.appendChild(renderWhoAmI());
    root.appendChild(renderMonthNav());

    if(state.loading){
      root.appendChild(el('div', {class:'empty-state'}, [
        el('div', {class:'display'}, ['Chargement du planning…'])
      ]));
    } else {
      root.appendChild(renderMain());
      root.appendChild(el('div', {class:'footer-note'}, [
        'Les inscriptions sont partagées en temps réel entre tous les intervenants. Chacun peut modifier ou retirer sa propre inscription à tout moment ; un administrateur peut modifier toutes les cases.'
      ]));
    }

    var modal=renderAdminModal(); if(modal) root.appendChild(modal);
    var manageModal=renderManageIntervenantsModal(); if(manageModal) root.appendChild(manageModal);
    var rubModal=renderManageRubriquesModal(); if(rubModal) root.appendChild(rubModal);
    var guestModal=renderGuestModal(); if(guestModal) root.appendChild(guestModal);
    var remModal=renderRemarqueModal(); if(remModal) root.appendChild(remModal);
    var helpModal=renderHelpModal(); if(helpModal) root.appendChild(helpModal);
    var toast=renderToast(); if(toast) root.appendChild(toast);
  }

  function bootstrapApp(){
    initEmailJS();
    if (window.__FIREBASE_CONFIG_MISSING__) {
      state.loading = false;
      state.configMissing = true;
      render();
      return;
    }
    render();
    loadOverrides();
  }

  var bootstrapped = false;
  function bootstrapOnce(){
    if (bootstrapped) return;
    bootstrapped = true;
    bootstrapApp();
  }

  if (window.__FIREBASE_READY__ || window.__FIREBASE_CONFIG_MISSING__) {
    bootstrapOnce();
  } else {
    window.addEventListener('firebase-ready', bootstrapOnce, { once:true });
    // Filet de sécurité : si le module Firebase ne se charge pas du tout
    // (URL bloquée, pas de réseau, erreur de configuration), on affiche
    // un message clair plutôt que de laisser la page vide indéfiniment.
    setTimeout(function(){
      if (!bootstrapped) {
        window.__FIREBASE_CONFIG_MISSING__ = true;
        bootstrapOnce();
      }
    }, 4000);
  }

})();
</script>
