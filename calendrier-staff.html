<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Agenda mensuel — Église Roubaix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ── Palette Notion × Google Workspace ── */
    --page-bg:#FAFAF8;       /* blanc cassé chaud */
    --white:#FFFFFF;
    --card-bg:#FFFFFF;
    --hover-bg:#F2F2EF;      /* hover cellule */
    --ink:#111110;           /* texte principal */
    --ink-soft:#4A4A42;      /* texte secondaire */
    --ink-faint:#9B9B93;     /* texte très discret */
    --line:#D8D8D4;          /* bordures */
    --line-strong:#D1D1CE;   /* bordures plus marquées */
    --action:#2383E2;        /* bleu action (Notion) */
    --action-pale:#EBF3FD;   /* fond action clair */
    --pill-active:#2F2F2C;   /* pill navigation actif */
    --staff-accent:#0057A8;  /* vert sauge — Staff */
    --staff-pale:#E8F0FB;    /* fond vert clair */
    --danger:#EB4A3F;
    --warn-bg:#FFF8E7;
    --radius:10px;
    --radius-lg:14px;
    --shadow:0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg:0 4px 24px rgba(0,0,0,.09);
    /* compat aliases (pour ne pas casser l'existant) */
    --cream:var(--page-bg);
    --cream-deep:#EFEFEB;
    --denim:var(--action);
    --denim-deep:#1A6BC6;
    --denim-pale:var(--action-pale);

    /* Couleurs par département — palette moderne sans marron */
    --col-culte:#2E4D5E;
    --col-louange:#7C3AED;
    --col-sono:#0891B2;
    --col-ecodim:#059669;
    --col-jeunes:#2563EB;
    --col-priere:#4F46E5;   /* indigo — PRIÈRE */
    --col-accueil:#0D9488;
    --col-streaming:#1A5C8A;
    --col-agapes:#E11D48;
    --col-aines:#6366F1;
    --col-femmes:#DB2777;
    --col-hommes:#1D4ED8;
    --col-menage:#15803D;
    --col-autre:#64748B;
    /* Couleurs pour depts renommés/créés via admin */
    /* ── 7 depts prioritaires : couleurs clairement distinctes ── */
    --col-conviv:#F43F5E;    /* rose vif      — CONVIVIALITÉ           */
    --col-equiper:#F59E0B;   /* ambre/miel    — ÉQUIPER                */
    --col-evangel:#EA580C;   /* orange brûlé  — ÉVANGÉLISATION         */
    --col-intend:#65A30D;    /* vert-jaune    — INTENDANCE             */
    --col-litt:#0D9488;      /* teal          — LITTÉRATURE            */
    --col-priere:#4F46E5;    /* indigo        — PRIÈRE et ADORATION    */
    --col-admin:#0EA5E9;
  --col-deco:#DB2777;     /* bleu ciel     — ADMINISTRATION         */
    /* ── autres depts ── */
    --col-social:#16A34A;
    --col-batiment:#CA8A04;
    --col-comm:#0284C7;
    --col-ecoute:#BE185D;
    --col-minist:#1D4ED8;
    /* Pool auto-assigné aux nouveaux depts */
    --col-auto0:#7C3AED;
    --col-auto1:#0891B2;
    --col-auto2:#EA580C;
    --col-auto3:#059669;
    --col-auto4:#DC2626;
    --col-auto5:#2563EB;
    --col-auto6:#9333EA;
    --col-auto7:#0F766E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--page-bg);color:var(--ink);}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Source Sans 3', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}

  /* ---- Topbar ---- */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:var(--white);
    border-bottom:1px solid var(--line);
    padding:10px 18px;
    display:flex;align-items:center;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;
    background:var(--staff-accent);
    display:flex;align-items:center;justify-content:center;
    color:white;font-size:17px;font-weight:700;flex-shrink:0;
    box-shadow:0 1px 3px rgba(0,87,168,.25);
  }
  .brand-text{display:flex;flex-direction:column;min-width:0;}
  .brand-text .t1{font-weight:700;font-size:15px;line-height:1.15;color:var(--ink);}
  .brand-text .t2{font-size:11px;color:var(--ink-soft);}
  .topbar-actions{display:flex;align-items:center;gap:8px;flex:none;}

  .pill-btn{
    border:none;background:var(--hover-bg);color:var(--ink);
    border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;
    cursor:pointer;font-family:inherit;transition:background .12s,color .12s;
    white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
  }
  .pill-btn:hover{background:var(--line);}
  .pill-btn:active{transform:translateY(0);}
  .pill-btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .pill-btn.admin{background:var(--staff-accent);color:white;}
  .pill-btn.admin:hover{background:var(--denim-deep);}
  .pill-btn.danger{background:var(--danger);color:white;}
  .pill-btn.small{font-size:11.5px;padding:4px 10px;}

  /* ---- Identity bar ---- */
  .id-bar{
    background:var(--page-bg);border-bottom:1px solid var(--line);
    padding:8px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    position:sticky; top:var(--topbar-height, 56px); z-index:95;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .id-bar label{font-size:13px;font-weight:600;color:var(--ink-soft);}
  .id-select{
    font-family:inherit;font-size:13px;font-weight:500;
    color:var(--ink);background:var(--white);
    border:1.5px solid var(--denim);border-radius:8px;
    padding:5px 10px;cursor:pointer;min-width:200px;
  }
  .id-bar select{
    font-family:inherit;font-size:13.5px;padding:6px 10px;border-radius:10px;
    border:1.5px solid var(--line);background:var(--white);color:var(--ink);
    cursor:pointer;
  }
  .admin-banner{
    background:var(--staff-accent);color:white;padding:8px 18px;
    font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .admin-banner b{font-weight:700;}

  /* ---- Nav semaine ---- */
  .month-nav-staff{
    background:var(--white);border-bottom:1px solid var(--line);
    padding:6px 16px;overflow-x:auto;white-space:nowrap;
    display:flex;gap:4px;align-items:center;scrollbar-width:none;
    position:sticky;top:64px;z-index:29;
  }
  .month-btn-staff{
    font-family:inherit;font-size:13px;font-weight:500;
    padding:5px 12px;border-radius:6px;border:none;
    background:transparent;color:var(--ink-soft);cursor:pointer;
    transition:background .1s,color .1s;
  }
  .month-btn-staff:hover{background:var(--hover-bg);color:var(--ink);}
  .month-btn-staff.active{background:var(--pill-active);color:white;font-weight:600;}
  
  


  .week-nav{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:12px 18px 8px;
  }
  .week-label{
    font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--ink);
    text-align:center;flex:1;
  }
  .week-label small{display:block;font-family:'Source Sans 3',sans-serif;font-weight:400;font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .btn-nav{
    border:1px solid var(--line);background:var(--white);
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;flex:none;
    transition:box-shadow .12s,transform .12s;
  }
  .btn-nav:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .btn-today{
    border:1px solid var(--denim);background:var(--denim-pale);color:var(--denim-deep);
    border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600;
    cursor:pointer;font-family:inherit;flex:none;
    transition:box-shadow .12s;
  }
  .btn-today:hover{box-shadow:var(--shadow);}

  /* ---- Grille semaine ---- */
  .week-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:0;border-top:1px solid var(--line);
    flex:1;
  }
  .day-col{
    border-right:1px solid var(--line);
    min-height:160px;background:var(--white);
    display:flex;flex-direction:column;
    transition:background .1s;
  }
  .day-col:last-child{border-right:none;}
  .day-col:hover{background:var(--hover-bg);}
  .day-header{
    padding:8px 8px 6px;
    background:var(--white);
    border-bottom:1px solid var(--line);
    text-align:center;
  }
  .day-header:hover{background:var(--denim-pale);}
  .day-header .dh-day{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);}
  .day-header .dh-date{font-size:20px;font-weight:600;color:var(--ink);line-height:1.2;margin-top:2px;}
  .day-header.today{background:var(--action-pale);}
  .day-header.today .dh-date{background:var(--action);color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
  .day-body{padding:4px;display:flex;flex-direction:column;gap:3px;flex:1;}

  /* ---- Event chips ---- */
  .event-chip{
    display:block;width:100%;text-align:left;border:none;cursor:pointer;
    padding:4px 7px;border-radius:6px;font-family:inherit;
    border-left:3px solid var(--chip-color);
    background:color-mix(in srgb, var(--chip-color) 15%, white);
    color:var(--ink);
    transition:filter .1s;
  }
  .event-chip:hover{filter:brightness(.96);}
  .event-chip:hover{box-shadow:0 3px 8px rgba(0,0,0,0.12);transform:translateY(-1px);}
  .event-chip .ec-time{font-size:10.5px;font-weight:600;color:var(--chip-color);line-height:1.2;}
  .event-chip .ec-title{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3;}
  .event-chip .ec-who{font-size:10.5px;color:var(--ink-soft);}

  /* Couleurs chips par département — bande gauche sur fond clair */
  
  .event-chip 
  .event-chip   .event-chip .ec-who{color:var(--ink-soft);}
  .chip-culte{--chip-color:var(--col-culte);}
  .chip-louange{--chip-color:var(--col-louange);}
  .chip-sono{--chip-color:var(--col-sono);}
  .chip-ecodim{--chip-color:var(--col-ecodim);}
  .chip-jeunes{--chip-color:var(--col-jeunes);}
  .chip-priere{--chip-color:var(--col-priere);}
  .chip-accueil{--chip-color:var(--col-accueil);}
  .chip-streaming{--chip-color:var(--col-streaming);}
  .chip-agapes{--chip-color:var(--col-agapes);}
  .chip-aines{--chip-color:var(--col-aines);}
  .chip-femmes{--chip-color:var(--col-femmes);}
  .chip-hommes{--chip-color:var(--col-hommes);}
  .chip-menage{--chip-color:var(--col-menage);}
  .chip-autre{--chip-color:var(--col-autre);}
  .chip-evangel{--chip-color:var(--col-evangel);}
  .chip-equiper{--chip-color:var(--col-equiper);}
  .chip-conviv{--chip-color:var(--col-conviv);}
  .chip-social{--chip-color:var(--col-social);}
  .chip-batiment{--chip-color:var(--col-batiment);}
  .chip-admin{--chip-color:var(--col-admin);}
  .chip-deco{--chip-color:var(--col-deco);}
  .chip-comm{--chip-color:var(--col-comm);}
  .chip-ecoute{--chip-color:var(--col-ecoute);}
  .chip-intend{--chip-color:var(--col-intend);}
  .chip-litt{--chip-color:var(--col-litt);}
  .chip-minist{--chip-color:var(--col-minist);}
  .chip-auto0{--chip-color:var(--col-auto0);}
  .chip-auto1{--chip-color:var(--col-auto1);}
  .chip-auto2{--chip-color:var(--col-auto2);}
  .chip-auto3{--chip-color:var(--col-auto3);}
  .chip-auto4{--chip-color:var(--col-auto4);}
  .chip-auto5{--chip-color:var(--col-auto5);}
  .chip-auto6{--chip-color:var(--col-auto6);}
  .chip-auto7{--chip-color:var(--col-auto7);}

  .add-chip{
    display:flex;align-items:center;justify-content:center;
    width:100%;padding:4px;border:none;background:transparent;
    color:var(--ink-faint);font-size:18px;cursor:pointer;border-radius:6px;
    transition:background .1s,color .1s;
  }
  .add-chip:hover{background:var(--hover-bg);color:var(--action);}
  .add-chip:hover{border-color:var(--denim);color:var(--denim);}

  /* ---- Légende ---- */
  .legend{
    display:flex;flex-wrap:wrap;gap:6px 12px;
    padding:10px 16px;border-top:1px solid var(--line);
    background:var(--white);
  }
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);}
  .legend-bar{width:3px;height:14px;border-radius:2px;flex-shrink:0;}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex:none;}

  /* ---- Section rubriques culte (dimanche) ---- */
  .culte-section{
    background:var(--white);border-radius:10px;
    border-left:3px solid var(--action);
    box-shadow:var(--shadow);
    padding:8px 10px;margin:4px;
    overflow:hidden;
  width:100%;box-sizing:border-box;}
  .culte-section .cs-title{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--action);margin-bottom:6px;}
  .culte-row{display:flex;flex-direction:column;gap:1px;margin-bottom:5px;}
  .culte-row .cr-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);}
  .culte-row .cr-value{font-size:11px;font-weight:600;color:var(--ink);word-break:break-word;line-height:1.3;}
  .culte-row .cr-empty{font-size:11px;color:var(--ink-faint);font-style:italic;}

  /* ---- Overlay / Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
  .modal{
    z-index:201;background:var(--white);border-radius:var(--radius-lg);
    padding:24px;max-width:500px;width:100%;
    box-shadow:var(--shadow-lg);
    max-height:90vh;overflow-y:auto;
  }
  .modal.modal-wide{max-width:540px;}
  .modal h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin:0 0 6px;}
  .modal p{font-size:13.5px;color:var(--ink-soft);margin:0 0 16px;line-height:1.5;}
  .modal-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;margin-top:16px;}
  .field-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:5px;}
  .field-label:first-of-type{margin-top:4px;}
  .modal input,.modal select,.modal textarea{
    width:100%;font-family:inherit;font-size:14.5px;padding:10px 12px;
    border-radius:10px;border:1.5px solid var(--line);background:var(--cream);color:var(--ink);
    margin-bottom:0;
  }
  .modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--denim);}
  .modal textarea{min-height:70px;resize:vertical;}
  .err-msg{font-size:12.5px;color:var(--terracotta);margin:6px 0 0;font-weight:600;}

  /* Récurrence */
  .recur-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
  .recur-row label{display:flex;align-items:center;gap:6px;font-size:13.5px;cursor:pointer;}
  .recur-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--denim);cursor:pointer;}
  .recur-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .recur-opt{
    border:1.5px solid var(--line);border-radius:8px;padding:5px 12px;
    font-size:12.5px;cursor:pointer;background:var(--cream);
    transition:border-color .15s,background .15s;
  }
  .recur-opt.active{border-color:var(--denim);background:var(--denim-pale);color:var(--denim-deep);font-weight:600;}

  /* Vue liste département ---- */
  .dept-filter{
    display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 12px;
  }
  .dept-btn{
    border:1.5px solid var(--line);border-radius:8px;padding:5px 12px;
    font-size:12px;cursor:pointer;background:var(--white);font-family:inherit;
    transition:all .15s;
  }
  .dept-btn.active{color:#fff;border-color:transparent;}

  /* Toast */
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--cream);padding:11px 20px;border-radius:999px;
    font-size:13.5px;font-weight:600;z-index:80;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);
    animation:rise .25s ease;pointer-events:none;
  }
  @keyframes rise{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

  .footer-note{text-align:center;padding:14px;font-size:11.5px;color:var(--ink-faint);border-top:1px solid var(--line);background:var(--white);}

  /* ---- Event detail panel ---- */
  .detail-dept-badge{
    display:inline-block;border-radius:6px;padding:3px 10px;
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    margin-bottom:12px;color:#fff;
  }
  .detail-row{display:flex;gap:10px;align-items:baseline;font-size:13.5px;margin-bottom:6px;}
  .detail-row .dr-label{font-weight:700;color:var(--ink-soft);min-width:90px;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}

  /* Liaison culte badge */
  .linked-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--denim-pale);color:var(--denim-deep);
    border:1px solid #c8d9e0;border-radius:8px;
    padding:5px 10px;font-size:12px;font-weight:600;margin-top:8px;
  }

  @media(max-width:700px){
    .week-grid{grid-template-columns:repeat(7,minmax(0,1fr));margin:0 8px 8px;}
    .event-chip .ec-who{display:none;}
    .legend{display:none;}
    .week-nav{padding:10px 10px 6px;}
    .event-chip{padding:3px 5px 3px 6px;font-size:10.5px;}
    .event-chip .ec-time{font-size:8.5px;}
    .event-chip .ec-title{font-size:10.5px;}
  }
  @media(max-width:480px){
    .day-header .dh-date{font-size:14px;}
    .day-header .dh-day{font-size:9px;}
    .brand-text .t2{display:none;}
  }

/* ── Durée / Plage multi-jours ── */
  .duree-section{
    background:var(--cream-deep); border:1px solid var(--line);
    border-radius:10px; padding:12px 14px; margin-bottom:12px;
  }
  .multijour-row{ display:flex; align-items:flex-end; gap:10px; margin-top:4px; }
  .multijour-preview{
    margin-top:8px; padding:8px 12px; background:#EEF3FB;
    border-radius:8px; font-size:12px; color:#2563EB;
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .chip-multiday .ec-time{ font-size:9px; }
  /* Jours de continuation d'un événement multi-jours */
  .chip-continuation{
    opacity:0.82;
    border-left-style:dashed !important;
    border-left-width:3.5px !important;
  }
  .chip-continuation .ec-time{
    font-style:italic;
    font-size:9px;
  }

/* ── Jours de la semaine (récurrence) ── */
  .jours-semaine-block{ margin:8px 0 4px; }
  .jours-semaine-btns{ display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .jour-btn{
    width:34px; height:34px; border-radius:50%;
    border:2px solid var(--line); background:var(--white);
    font-size:12px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-family:inherit; transition:all .12s; color:var(--ink-soft);
  }
  .jour-btn:hover{ border-color:var(--denim); color:var(--denim); }
  .jour-btn.actif{ background:var(--denim); border-color:var(--denim); color:#fff; }
  .jours-warning{ font-size:11.5px; color:#c0623e; margin-top:5px; }

/* ── Fin de récurrence (Jamais / Le / Après N) ── */
  .recur-fin-section{ margin-top:10px; }
  .recur-fin-options{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .recur-fin-row{
    display:flex; align-items:center; gap:6px;
    font-size:13px; cursor:pointer;
  }
  .recur-fin-row input[type=radio]{ cursor:pointer; }
  .recur-fin-date{
    width:150px; padding:4px 8px; font-size:12px;
    border:1px solid var(--line); border-radius:6px;
    background:var(--white); font-family:inherit;
  }
  .recur-fin-count{

var db, fsDoc, fsCollection, fsOnSnapshot, fsSetDoc, fsDeleteDoc;

function initFirebase(){
  db          = window.__STAFF_DB__;
  fsDoc       = window.__STAFF_DOC__;
  fsCollection= window.__STAFF_COLLECTION__;
  fsOnSnapshot= window.__STAFF_ON_SNAPSHOT__;
  fsSetDoc    = window.__STAFF_SET_DOC__;
  fsDeleteDoc = window.__STAFF_DELETE_DOC__;

  // Écoute en temps réel de tous les événements
  var colRef = fsCollection(db, 'calendrier_staff');
  fsOnSnapshot(colRef, function(snap){
    var evts = {};
    snap.forEach(function(d){
      if(d.id === '_config') return; // _config n'est pas un événement
      evts[d.id] = Object.assign({id:d.id}, d.data());
    });
    state.events = evts;
    state.loading = false;
    render();
  }, function(err){
    console.error(err);
    state.loading = false;
    showToast("Erreur de connexion à la base de données.");
    render();
  });

  // Écoute multi-années des données culte partagées
  // Une collection par année : planning_culte_2026, planning_culte_2027, …
  // Le calendrier staff écoute automatiquement toutes les années couvertes (2026-2035)
  loadPlanningData(); // Générer d'abord les dates pour connaître les années
  var CULTE_YEARS = [];
  for(var cy = 2026; cy <= 2035; cy++) CULTE_YEARS.push(cy);

  CULTE_YEARS.forEach(function(yr){
    var ref = fsDoc(db, 'planning_culte_' + yr, 'overrides');
    fsOnSnapshot(ref, function(snap){
      if(snap.exists() && snap.data() && snap.data().value){
        state.culteDataByYear[yr] = JSON.parse(snap.data().value);
      } else {
        state.culteDataByYear[yr] = {};
      }
      render();
    }, function(){}); // silencieux si la collection n'existe pas encore
  });

  // Écoute des intervenants du Planning (2026 et 2027+)
  // Les deux collections partagent la même liste d'intervenants.
  // On écoute 2026 (source principale) et 2027 (qui peut avoir ses propres ajouts).
  function listenIntervenants(collection){
    var ref = fsDoc(db, collection, 'intervenants');
    fsOnSnapshot(ref, function(snap){
      if(snap.exists() && snap.data() && snap.data().value){
        try {
          var ov = JSON.parse(snap.data().value);
          // Fusionner avec les overrides existants
          Object.assign(state.planningIntervenantsOverrides, ov);
        } catch(e){}
      }
      render();
    }, function(){});
  }
  listenIntervenants('planning_culte_2026');
  listenIntervenants('planning_culte_2027');

  // Écoute de la config dynamique (depts + responsables) du Agenda mensuel
  var cfgRef = fsDoc(db, 'calendrier_staff', '_config');
  fsOnSnapshot(cfgRef, function(snap){
    if(snap.exists() && snap.data()){
      var d = snap.data();
      try { state.deptsOverrides      = d.depts      ? JSON.parse(d.depts)      : []; } catch(e){ state.deptsOverrides=[]; }
      try { state.responsablesOverrides = d.responsables ? JSON.parse(d.responsables) : []; } catch(e){ state.responsablesOverrides=[]; }
      try { state.emailsStaff    = d.emailsStaff    ? JSON.parse(d.emailsStaff)    : {}; } catch(e){ state.emailsStaff={}; }
      try { state.groupesRappel  = d.groupesRappel  ? JSON.parse(d.groupesRappel)  : []; } catch(e){ state.groupesRappel=[]; }
    } else {
      state.deptsOverrides = [];
      state.responsablesOverrides = [];
      state.emailsStaff = {};
      state.groupesRappel = [];
      state.configLoaded = true;
    }
    // Marquer config chargée (même si vide — Firebase a répondu) + forcer re-render
    state.configLoaded = true;
    state._configLastUpdated = Date.now();
    // Migration initiale au premier chargement
    if(!state._emailsMigrationDone){
      state._emailsMigrationDone = true;
      migrerEmailsVersCommunsAgenda();
    }
    render();
  }, function(){});

  // ── Listener emails communs (_emails_staff) ──
  var emailsCommunsRef = fsDoc(db, '_emails_staff', 'emails');
  fsOnSnapshot(emailsCommunsRef, function(snap){
    if(snap.exists() && snap.exists() && snap.data() && snap.data().value){
      try{
        var communs = JSON.parse(snap.data().value);
        state.emailsCommuns = communs; // mettre en cache
        // Appliquer à emailsStaff : enrichir sans écraser les valeurs locales
        var changed = false;
        Object.keys(communs).forEach(function(nom){
          if(communs[nom] && state.emailsStaff[nom] !== communs[nom]){
            state.emailsStaff[nom] = communs[nom];
            changed = true;
          }
        });
        if(changed) render();
      }catch(e){}
    }
  }, function(){});
}

function labelToCls(label){

  }
  return null;
}

var VALIDATION_START = '2026-09-07';

function isAutoValidated(evt){
  // Events sans date ou avant le 7 sept 2026 → auto-validés
  if(!evt.date || evt.date < VALIDATION_START) return true;
  return false;
}

function isValidated(evt){
  if(isAutoValidated(evt)) return true;
  return !!evt.validated;
}

async function toggleValidation(evtId){
  var evt = state.events[evtId];
  if(!evt) return;
  var newVal = !isValidated(evt);
  try {
    await fsSetDoc(fsDoc(db,'calendrier_staff',evtId), {validated: newVal}, {merge:true});
    showToast(newVal ? '✓ Événement validé — visible par tous.' : 'Événement repassé en attente.');
  } catch(e) {
    showToast('Erreur lors de la validation.');
  }
}

function getDepts(){
  // Fusionne la liste de base avec les overrides (ajouts/modifications/suppressions admin)
  var base = DEPTS_BASE.map(function(d){ return Object.assign({},d); });
  var byId = {};
  base.forEach(function(d){ byId[d.id] = d; });
  var autoIdx = 0;
  (state.deptsOverrides||[]).forEach(function(d){
    if(d._deleted){ delete byId[d.id]; }
    else if(byId[d.id]){ byId[d.id].label = d.label; }
    else {
      // Nouveau dept : deviner la cls depuis le label, ou auto-assigner
      var cls = (d.cls && d.cls !== 'autre') ? d.cls
              : (labelToCls(d.label) || AUTO_CLS[autoIdx % AUTO_CLS.length]);
      if(!d.cls || d.cls === 'autre') autoIdx++;
      byId[d.id] = {id:d.id, label:d.label, cls:cls};
    }
  });
  return Object.values(byId).sort(function(a,b){
    if(a.id==='Autre') return 1; if(b.id==='Autre') return -1;
    return a.label.localeCompare(b.label,'fr',{sensitivity:'base'});
  });
}

function loadPlanningData(){
  var START_YEAR = 2026;
  var END_YEAR   = 2035;
  var rowIndex   = 1;

  for(var year = START_YEAR; year <= END_YEAR; year++){
    for(var month = 0; month < 12; month++){
      // Trouver tous les dimanches du mois
      var d = new Date(year, month, 1);
      // Avancer jusqu'au premier dimanche
      while(d.getDay() !== 0) d.setDate(d.getDate() + 1);
      var firstSundayOfMonth = true;
      while(d.getMonth() === month){
        var iso = toISO(d);
        var hasSC = firstSundayOfMonth; // Sainte-Cène le 1er dimanche
        // Pour 2026, utiliser les vrais IDs du Planning (table de correspondance).
        // Pour les autres années, générer un ID séquentiel.
        var base2026 = PLANNING_CULTE_BASE[iso] || null;
        var realId = base2026 ? base2026.id : ('row' + rowIndex);
        var baseData = base2026 || {};
        PLANNING_CULTE_DATES[iso] = {
          id:             realId,
          date:           iso,
          hasSainteCene:  hasSC,
          typeCulte:      baseData.typeCulte || (hasSC ? 'Sainte-Cène' : null),
          predicateur:    baseData.predicateur    || null,
          presidentCulte: baseData.presidentCulte || null,
          remarques:      baseData.remarques      || null,
        };
        rowIndex++;
        firstSundayOfMonth = false;
        d.setDate(d.getDate() + 7);
      }
    }
  }
}

function genId(){
  return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

async function saveEvent(evtData){
  try{
    // Résoudre le responsable libre
    if(evtData.responsable === '__libre__' && evtData._respLibre){
      evtData.responsable = evtData._respLibre.trim() || null;
    } else if(evtData.responsable === '__libre__'){
      evtData.responsable = null;
    }
    delete evtData._respLibre;
    delete evtData.showRappelsSection; // champ UI, pas Firebase
    var id = evtData.id || genId();
    evtData.id = id;
    await fsSetDoc(fsDoc(db, 'calendrier_staff', id), evtData);
    showToast(evtData._new ? "Événement ajouté." : "Événement mis à jour.");
  }catch(e){
    console.error(e);
    showToast("Erreur — veuillez réessayer.");
  }
}

async function deleteEvent(id){
  try{
    await fsDeleteDoc(fsDoc(db, 'calendrier_staff', id));
    showToast("Événement supprimé.");
  }catch(e){
    console.error(e);
    showToast("Erreur — veuillez réessayer.");
  }
}

// ── Synchronisation emails communs (Agenda ↔ Je m'inscris) ──
// ── Migration initiale des emails Agenda → _emails_staff ──
async function migrerEmailsVersCommunsAgenda(){
  try{
    if(!db || !fsDoc || !fsSetDoc) return;
    var emails = state.emailsStaff || {};
    if(Object.keys(emails).length === 0) return;
    var ref = fsDoc(db,'_emails_staff','emails');
    // Fusionner avec le cache emailsCommuns (maintenu par onSnapshot)
    var merged = Object.assign({}, state.emailsCommuns, emails);
    await fsSetDoc(ref,{ value: JSON.stringify(merged) });
    console.log('Migration Agenda → _emails_staff : '+Object.keys(emails).length+' email(s)');
  }catch(e){ console.warn('migrerEmailsVersCommunsAgenda:', e); }
}


async function syncEmailsCommuns(){
  try{
    if(!db || !fsDoc || !fsSetDoc) return;
    var ref = fsDoc(db,'_emails_staff','emails');
    // Fusionner avec le cache (maintenu par onSnapshot) — pas besoin de getDoc
    var merged = Object.assign({}, state.emailsCommuns, state.emailsStaff);
    await fsSetDoc(ref,{ value: JSON.stringify(merged) });
  }catch(e){ console.warn('syncEmailsCommuns:', e); }
}

// Écrit dans la collection de l'année concernée (planning_culte_YYYY/overrides)
async function saveCulteField(dateISO, fieldKey, value){
  try{
    var year = dateISO.slice(0, 4);
    var collectionName = 'planning_culte_' + year;
    var existing = state.culteDataByYear[year] || {};
    var rowId = PLANNING_CULTE_DATES[dateISO] ? PLANNING_CULTE_DATES[dateISO].id : null;
    if(!rowId){ showToast("Date introuvable dans le planning culte."); return; }
    if(!existing[rowId]) existing[rowId] = {};
    existing[rowId][fieldKey] = value || null;
    existing[rowId]['_date'] = dateISO;
    await fsSetDoc(fsDoc(db, collectionName, 'overrides'), { value: JSON.stringify(existing) });
    state.culteDataByYear[year] = existing;
    showToast("Rubrique culte mise à jour.");
  }catch(e){
    console.error(e);
    showToast("Erreur — veuillez réessayer.");
  }
}

function mondayOf(d){
  var day = d.getDay(); // 0=dim
  var diff = (day === 0) ? -6 : 1 - day;
  var m = new Date(d); m.setDate(d.getDate() + diff); m.setHours(0,0,0,0);
  return m;
}

// Semaine de référence = lundi de la semaine courante au chargement
// weekOffset 0 = semaine actuelle, négatif = passé, positif = futur
var START_WEEK = (function(){
  var today = new Date(); today.setHours(0,0,0,0);
  var day = today.getDay(); // 0=dim
  var diff = (day === 0) ? -6 : 1 - day;
  today.setDate(today.getDate() + diff);
  return today;
})();

function getWeekDates(){
  var base = new Date(START_WEEK);
  base.setDate(base.getDate() + state.weekOffset * 7);
  var days = [];
  for(var i=0;i<7;i++){
    var d = new Date(base); d.setDate(base.getDate() + i); d.setHours(0,0,0,0);
    days.push(d);
  }
  return days;
}

function toISO(d){
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

function isToday(d){
  var t = new Date(); t.setHours(0,0,0,0);
  return d.getTime() === t.getTime();
}

function weekLabel(days){
  var a = days[0], b = days[6];
  if(a.getMonth()===b.getMonth()){
    return a.getDate() + ' – ' + b.getDate() + ' ' + MOIS_FR[a.getMonth()] + ' ' + a.getFullYear();
  }
  return a.getDate()+' '+MOIS_FR[a.getMonth()]+' – '+b.getDate()+' '+MOIS_FR[b.getMonth()]+' '+b.getFullYear();
}

function getCulteOverrideForDate(dateISO){
  var baseRow = PLANNING_CULTE_DATES[dateISO];
  if(!baseRow) return null;
  var year = dateISO.slice(0, 4);
  var yearData = state.culteDataByYear[year] || {};
  var ov = yearData[baseRow.id] || {};
  // __remarque est la clé utilisée par Planning des cultes
  var remarque = ov.__remarque !== undefined ? ov.__remarque
               : ov.remarques  !== undefined ? ov.remarques
               : baseRow.remarques;
  return {
    predicateur:    ov.predicateur    !== undefined ? ov.predicateur    : baseRow.predicateur,
    typeCulte:      ov.typeCulte      !== undefined ? ov.typeCulte      : baseRow.typeCulte,
    presidentCulte: ov.presidentCulte !== undefined ? ov.presidentCulte : baseRow.presidentCulte,
    remarques:      remarque,
    hasSainteCene:  baseRow.hasSainteCene,
    _rowId:         baseRow.id,
  };
}

// ============================================================
// HELPERS DOM
// ============================================================
function el(tag, attrs, children){
  var node = document.createElement(tag);
  attrs = attrs || {};
  Object.keys(attrs).forEach(function(k){
    var v = attrs[k];
    if(k==='class') node.className = v;
    else if(k==='html') node.innerHTML = v;
    else if(k.indexOf('on')===0 && typeof v==='function') node.addEventListener(k.slice(2),v);
    else if(k==='disabled'){ if(v) node.setAttribute('disabled','disabled'); }
    else if(k==='checked'){ node.checked=!!v; if(v) node.setAttribute('checked','checked'); }
    else if(k==='selected'){ if(v) node.setAttribute('selected','selected'); }
    else if(k==='style') node.setAttribute('style',v);
    else if(v==null){}
    else node.setAttribute(k,v);
  });
  (children||[]).forEach(function(c){
    if(c==null) return;
    if(typeof c==='string') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

async function submitEventForm(){
  if(!formDraft.date){ showToast("Veuillez choisir une date."); return; }
  if(!formDraft.departement){ showToast("Veuillez choisir un département."); return; }
  if(!formDraft.titre.trim()){ showToast("Veuillez saisir un titre."); return; }
  var _respCheck = formDraft.responsable === '__libre__' ? (formDraft._respLibre||'').trim() : formDraft.responsable;
  if(!_respCheck){ showToast('Veuillez indiquer un responsable.'); return; }
  // Jours-semaine : bloquer si aucun jour sélectionné
  if(formDraft.recurrence==='jours-semaine' && (!formDraft.joursActifs || formDraft.joursActifs.length===0)){
    showToast('Sélectionnez au moins un jour de la semaine.'); return;
  }

  // Vérifier que l'utilisateur peut modifier (le sien ou admin)
  if(!state.isAdmin && state.editingEvent){
    var existing = state.events[state.editingEvent];
    if(existing && existing.responsable !== state.currentUser){
      showToast("Vous ne pouvez modifier que vos propres événements.");
      return;
    }
  }

  // Résoudre responsable libre avant validation
  var responsableFinal = formDraft.responsable;
  if(formDraft.responsable === '__libre__'){
    responsableFinal = (formDraft._respLibre || '').trim() || null;
    if(!responsableFinal){ showToast('Veuillez saisir le nom du responsable.'); return; }
  }

  var evtData = {
    date: formDraft.date,
    heureDebut: formDraft.heureDebut,
    heureFin: formDraft.heureFin,
    departement: formDraft.departement,
    titre: formDraft.titre.trim(),
    conducteur: formDraft.conducteur.trim() || null,
    responsable: responsableFinal,
    notes: formDraft.notes.trim(),
    createdBy: state.currentUser || 'Staff',
    updatedAt: new Date().toISOString(),
    // Rappels email — toujours inclus pour ne pas perdre les données
    audience:      formDraft.audience      || 'commun',
    destinataires: formDraft.destinataires || [],
    emailsLibres:  formDraft.emailsLibres  || [],
    groupeRappel:  formDraft.groupeRappel  || '',
    // Statut de validation — hérité pour préserver la visibilité des occurrences recréées
    validated:     formDraft.validated     || false,
  };
  if(!state.editingEvent) evtData._new = true;
  if(state.editingEvent) evtData.id = state.editingEvent;
  // Plage multi-jours : stocker dateFinJour si modeMultiJour activé
  if(formDraft.modeMultiJour && formDraft.dateFinJour && formDraft.dateFinJour > formDraft.date){
    evtData.dateFinJour = formDraft.dateFinJour;
    // Si plage de jours → pas de récurrence (mutuellement exclusif)
    formDraft.recurrence = 'none';
  } else {
    evtData.dateFinJour = null;
  }

  closeEventForm();

  // Récurrence : générer plusieurs événements
  if(formDraft.recurrence !== 'none'){
    // Construire serieMeta pour lier les occurrences et permettre modif future
    var sid = formDraft._serieId || genId();
    var serieMeta = {
      freq: formDraft.recurrence,
      finMode: formDraft.recurrenceFin || 'never',
      fin: formDraft.recurrenceFin==='date' ? formDraft.recurrenceJusquau : null,
      count: formDraft.recurrenceFin==='count' ? (parseInt(formDraft.recurrenceCount,10)||52) : null,
      nthWeek: formDraft.nthWeek,
      nthDay: formDraft.nthDay,
      joursActifs: formDraft.recurrence==='jours-semaine' ? formDraft.joursActifs : [],
      heureDebut: formDraft.heureDebut,
      heureFin: formDraft.heureFin,
    };
    var endDate = formDraft.recurrenceFin==='date' ? formDraft.recurrenceJusquau : null;
    var dates = buildRecurrenceDates(formDraft.date, formDraft.recurrence, endDate, formDraft.nthWeek, formDraft.nthDay, formDraft.recurrenceFin, parseInt(formDraft.recurrenceCount,10)||52, formDraft.joursActifs);

    // Si modification d'une série existante : supprimer les anciennes occurrences selon le choix
    if(state.editingEvent && formDraft._serieId){
      var choice = state.editSerieChoice || 'all';
      var evtDate = evtData.date;
      var toDelete = Object.values(state.events).filter(function(ev){
        if(ev.serieId !== formDraft._serieId) return false;
        if(choice==='one') return ev.id===state.editingEvent;
        if(choice==='following') return ev.date >= evtDate;
        return true; // 'all'
      });
      for(var j=0;j<toDelete.length;j++){
        try{ await fsDeleteDoc(fsDoc(db,'calendrier_staff',toDelete[j].id)); }catch(e){}
      }
    }

    for(var i=0;i<dates.length;i++){
      var copy = Object.assign({}, evtData);
      copy.date = dates[i];
      copy.id = genId();
      copy.serieId = sid;
      copy.serieMeta = serieMeta;
      // Propager les champs rappels à chaque occurrence (déjà dans evtData via Object.assign)
      // Plage multi-jours récurrente : propager dateFinJour si renseigné
      if(formDraft.dateFinJour && formDraft.dateFinJour > formDraft.date){
        var startD = new Date(formDraft.date+'T00:00:00');
        var endD = new Date(formDraft.dateFinJour+'T00:00:00');
        var offset = Math.round((endD-startD)/(86400000));
        var occStart = new Date(dates[i]+'T00:00:00');
        occStart.setDate(occStart.getDate()+offset);
        copy.dateFinJour = toISO(occStart);
      } else {
        copy.dateFinJour = null;
      }
      delete copy._new;
      await saveEvent(copy);
    }
    showToast(dates.length + ' occurrences créées.');
    state.editSerieChoice = null;
  } else {
    // Ajouter ou modifier sans récurrence
    if(evtData.id && state.events[evtData.id] && state.events[evtData.id].serieId){
      // On modifie une occurrence d'une série : retirer le lien de série
      evtData.serieId = null;
      evtData.serieMeta = null;
    }
    await saveEvent(evtData);
  }
}

// Retourne la date du Nième [dayOfWeek] du mois d'une date donnée
// nth=1..4 ou 5 (= dernier), dayOfWeek=0(dim)..6(sam)
function getNthDayOfMonth(year, month, nth, dayOfWeek){
  if(nth === 5){
    // Dernier : partir du dernier jour du mois et reculer
    var last = new Date(year, month+1, 0);
    var diff = (last.getDay() - dayOfWeek + 7) % 7;
    last.setDate(last.getDate() - diff);
    return last;
  }
  // Trouver le 1er occurrence du jour dans le mois
  var first = new Date(year, month, 1);
  var diff = (dayOfWeek - first.getDay() + 7) % 7;
  first.setDate(1 + diff + (nth-1)*7);
  // Vérifier que c'est encore dans le bon mois
  if(first.getMonth() !== month) return null;
  return first;
}

function buildRecurrenceDates(startISO, freq, endISO, nthWeek, nthDay, finMode, count, joursActifs){
  var dates = [];
  var start = new Date(startISO + 'T00:00:00');
  // Calculer la date de fin selon finMode
  var end;
  if(finMode === 'never' || !finMode && !endISO){
    // "Jamais" : générer sur 2 ans à partir du début (plafond de sécurité)
    end = new Date(start);
    end.setFullYear(end.getFullYear() + 2);
  } else if(finMode === 'count' && count > 0){
    // "Après N occurrences" : on générera au fur et à mesure et on s'arrête à count
    end = new Date(start);
    end.setFullYear(end.getFullYear() + 10); // plafond large, stoppé par count
  } else {
    // "Le [date]" : comportement original
    end = new Date((endISO || startISO) + 'T00:00:00');
  }

  if(freq === 'jours-semaine'){
    // Répète certains jours de la semaine (ex: L+J+D)
    var actifs = joursActifs && joursActifs.length > 0 ? joursActifs : [start.getDay()];
    var cur = new Date(start);
    while(cur <= end){
      if(actifs.indexOf(cur.getDay()) >= 0 && cur >= start){
        dates.push(toISO(cur));
        if(finMode==='count' && count>0 && dates.length>=count) break;
      }
      cur.setDate(cur.getDate() + 1);
    }
  } else if(freq === 'mensuel-sem'){
    // Nième [jour de la semaine] du mois
    var nth = nthWeek || 1;
    var dow = (nthDay !== undefined && nthDay !== null) ? nthDay : start.getDay();
    var cur = new Date(start.getFullYear(), start.getMonth(), 1);
    while(cur <= end){
      var d = getNthDayOfMonth(cur.getFullYear(), cur.getMonth(), nth, dow);
      if(d && d >= start && d <= end){
        dates.push(toISO(d));
        if(finMode==='count' && count>0 && dates.length>=count) break;
      }
      cur.setMonth(cur.getMonth() + 1);
    }
  } else if(freq === 'mensuel'){
    var cur = new Date(start);
    while(cur <= end){
      dates.push(toISO(cur));
      if(finMode==='count' && count>0 && dates.length>=count) break;
      var day = cur.getDate();
      cur.setMonth(cur.getMonth() + 1);
      if(cur.getDate() !== day) cur.setDate(0);
    }
  } else {
    var step = {hebdomadaire:7, bimensuel:14}[freq] || 7;
    var cur = new Date(start);
    while(cur <= end){
      dates.push(toISO(cur));
      if(finMode==='count' && count>0 && dates.length>=count) break;
      cur.setDate(cur.getDate() + step);
    }
  }
  return dates;
}

function renderMonthNav(){
  var MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin',
              'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var now = new Date();
  var currentYear = now.getFullYear();
  // Calculer le mois affiché actuellement
  var days = getWeekDates();
  var currentMonth = days[0].getMonth();

  var btns = MOIS.map(function(m, idx){
    var isActive = idx === currentMonth;
    var btnEl = el('button',{
      class:'month-btn-staff'+(isActive?' active':''),
    },[m]);
    // Fonction de navigation vers ce mois
    var goToMonth = function(monthIdx){
      var onMob = window.innerWidth < 768;
      if(onMob && state.viewMode !== 'month'){
        // Mode Planning mobile : scroller vers l'ancre du mois
        var moisKey = currentYear + '-' + (monthIdx < 9 ? '0' : '') + (monthIdx+1);
        var anchor = document.getElementById('pl-month-' + moisKey);
        if(anchor){
          anchor.scrollIntoView({behavior:'smooth', block:'start'});
        } else {
          // Mois pas encore visible (passé) — ne rien faire
        }
        return;
      }
      // Mode Semaine ou Mois desktop : changer l'offset
      var target = new Date(currentYear, monthIdx, 1);
      var day = target.getDay();
      var diff = (day === 0) ? -6 : 1 - day;
      target.setDate(target.getDate() + diff);
      var diffMs = target - START_WEEK;
      var now2 = new Date();
      state.monthOffset = (currentYear - now2.getFullYear()) * 12 + (monthIdx - now2.getMonth());
      state.weekOffset = Math.round(diffMs / (7*24*3600*1000));
      render();
    };
    // Sur mobile : utiliser touchend pour éviter conflit avec scroll
    var _touchMoved = false;
    btnEl.addEventListener('touchstart', function(){ _touchMoved = false; }, {passive:true});
    btnEl.addEventListener('touchmove', function(){ _touchMoved = true; }, {passive:true});
    btnEl.addEventListener('touchend', function(e){
      if(!_touchMoved){ e.preventDefault(); goToMonth(idx); }
    });
    btnEl.addEventListener('click', function(){ goToMonth(idx); });
    return btnEl;
  });
  // Toggle vue Semaine / Mois
  var toggleView = el('div',{class:'view-toggle'},[
    window.innerWidth < 768
      ? el('button',{
          class:'view-btn'+(state.viewMode!=='month'?' active':''),
          onclick:function(){ state.viewMode='week'; render(); }
        },['Planning'])
      : el('button',{
          class:'view-btn'+(state.viewMode==='week'?' active':''),
          onclick:function(){ state.viewMode='week'; render(); }
        },['Semaine']),
    el('button',{
      class:'view-btn'+(state.viewMode==='month'?' active':''),
      onclick:function(){ state.viewMode='month'; render(); }
    },['Mois']),
  ]);
  return el('div',{class:'month-nav-staff'},[
    el('div',{class:'month-nav-months'},btns),
    toggleView,
  ]);
}

function getWeekNumber(d){
  var onejan = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
}

function renderWeekGrid(){
  var days = getWeekDates();
  var cols = days.map(function(d){ return renderDayCol(d); });
  return el('div',{class:'week-grid'},cols);
}

function renderDayCol(d){
  var iso = toISO(d);
  var evtsOfDay = Object.values(state.events).filter(function(e){
    if(!state.isStaff && !isValidated(e)) return false;
    if(e.date === iso) return true;
    if(e.dateFinJour && e.dateFinJour > e.date && iso > e.date && iso <= e.dateFinJour) return true;
    return false;
  });
  evtsOfDay.sort(function(a,b){ return (a.heureDebut||'').localeCompare(b.heureDebut||''); });

  var isSunday = d.getDay() === 0;
  var culteInfo = isSunday ? getCulteOverrideForDate(iso) : null;

  var headerCls = 'day-header' + (isToday(d) ? ' today' : '');

  var bodyChildren = [];

  // Bloc culte du dimanche (données partagées)
  if(isSunday && culteInfo){
    var culteChildren = [
      el('div',{class:'cs-title'},['📖 Culte du dimanche'])
    ];
    var fields = [
      {key:'predicateur',label:'Prédicateur'},
      {key:'presidentCulte',label:'Président'},
      {key:'typeCulte',label:'Type'},
      {key:'remarques',label:'Remarques'},
    ];
    fields.forEach(function(f){
      var val = culteInfo[f.key];
      if(!val && !state.isAdmin) return;
      if(!val && state.isAdmin && f.key === 'typeCulte') return;
      var valNode;
      if(val){
        // Vérifier indisponibilité uniquement pour prédicateur et président
        var indispo = (f.key === 'predicateur' || f.key === 'presidentCulte')
          ? isIndisponibleStaff(val, iso)
          : null;
        if(indispo){
          valNode = el('span',{class:'cr-value cr-value-indispo'},[
            val,
            el('span',{
              class:'cr-indispo-badge',
              title:'Absent(e) du '+indispo.du+' au '+indispo.au,
              onclick:function(e){
                e.stopPropagation();
                showToast('⚠ '+val+' — Congé du '+indispo.du+' au '+indispo.au);
              }
            },['⚠'])
          ]);
        } else {
          valNode = el('span',{class:'cr-value'},[val]);
        }
      } else {
        valNode = el('span',{class:'cr-empty'},['—']);
      }

      // Seul l'Admin peut éditer les champs culte (prédicateur, président, remarques)
      var canEditField = state.isAdmin;
      if(canEditField){
        valNode = el('span',{
          class:'cr-value',
          style:'cursor:pointer;text-decoration:underline dotted;color:'+(val?'inherit':'#aaa'),
          onclick:function(){ promptEditCulteField(iso, f.key, val, culteInfo._rowId); }
        },[val || '(vide) ✏']);
      }

      culteChildren.push(el('div',{class:'culte-row'},[
        el('span',{class:'cr-label'},[f.label]),
        valNode
      ]));
    });
    if(culteInfo.hasSainteCene){
      culteChildren.push(el('div',{class:'cr-label',style:'margin-top:4px;font-size:9.5px;color:#2E4D5E;font-weight:700;'},['🍷 Sainte-Cène']));
    }
    bodyChildren.push(el('div',{class:'culte-section'},culteChildren));
  }

  // Événements (passer la date courante pour adapter l'affichage multi-jours)
  evtsOfDay.forEach(function(evt){
    bodyChildren.push(renderEventChip(evt, iso));
  });

  // Bouton ajouter
  if(state.isStaff){
    bodyChildren.push(el('button',{class:'add-chip',onclick:function(){ openNewEvent(iso); }},['＋']));
  }

  return el('div',{class:'day-col'},[
    el('div',{class:headerCls,onclick:function(){ openNewEvent(iso); }},[
      el('div',{class:'dh-day'},[JOURS_FR[d.getDay()]]),
      el('div',{class:'dh-date'},[String(d.getDate())])
    ]),
    el('div',{class:'day-body'},bodyChildren)
  ]);
}

function renderEventChip(evt, currentDateISO){
  var dept = deptById(evt.departement||'Autre');
  var isMultiDay = !!(evt.dateFinJour && evt.dateFinJour > evt.date);
  var curISO = currentDateISO || evt.date;
  var isFirstDay = curISO === evt.date;
  var isLastDay  = isMultiDay && curISO === evt.dateFinJour;
  var isContinuation = isMultiDay && curISO > evt.date;

  // Affichage de la ligne temporelle
  var timeLabel;
  if(isMultiDay){
    if(isFirstDay){
      // 1er jour : afficher la plage complète
      timeLabel = new Date(evt.date+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
                  + ' → '
                  + new Date(evt.dateFinJour+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    } else {
      // Jours suivants : afficher "← suite" ou la date de fin
      timeLabel = isLastDay ? 'Dernier jour' : '← suite';
    }
  } else {
    timeLabel = evt.heureDebut ? evt.heureDebut + (evt.heureFin ? '–'+evt.heureFin : '') : '';
  }

  var pendingClass = state.isStaff && !isValidated(evt) ? ' chip-pending' : '';
  var chipClass = 'event-chip chip-'+dept.cls
    + (isMultiDay ? ' chip-multiday' : '')
    + (isContinuation ? ' chip-continuation' : '')
    + pendingClass;

  return el('button',{
    class:chipClass,
    onclick:function(e){ e.stopPropagation(); state.showEventDetail=evt.id; render(); }
  },[
    timeLabel ? el('div',{class:'ec-time'},[timeLabel]) : null,
    // Jours de continuation : titre abrégé
    el('div',{class:'ec-title'},[
      evt.titre + (evt.conducteur && isFirstDay ? ' ('+evt.conducteur+')' : '')
    ]),
    // Responsable uniquement sur le 1er jour (pas de doublon)
    !isContinuation ? el('div',{class:'ec-who'},[evt.responsable||'']) : null,
  ]);
}

function renderLegend(){
  var items = getDepts().map(function(d){
    // Bande de couleur cohérente avec le chip
    var bar = el('div',{class:'legend-bar',style:'background:var(--col-'+d.cls+',var(--col-autre))'},[]);
    return el('div',{class:'legend-item'},[bar, d.label]);
  });
  return el('div',{class:'legend'},items);
}

function renderEventForm(){
  if(!state.showEventForm) return null;
  var isEdit = !!state.editingEvent;

  var activeDepts = getDepts();
  // Si le département de l'event édité a été supprimé entre-temps, on l'affiche quand même
  var deptExists = !formDraft.departement || activeDepts.some(function(d){ return d.id===formDraft.departement; });
  var deptOpts = [el('option',{value:''},['— Département —'])].concat(
    activeDepts.map(function(d){ return el('option',{value:d.id,selected:formDraft.departement===d.id},[d.label]); })
  );
  if(!deptExists && formDraft.departement){
    // Ajouter l'option (supprimée) en tête pour ne pas perdre la valeur
    deptOpts.splice(1, 0, el('option',{value:formDraft.departement,selected:true},[formDraft.departement+' (supprimé)']));
  }

  // Responsables : liste triée, saisie libre possible
  var allResps = getResponsables();
  var isRespFree = formDraft.responsable && allResps.indexOf(formDraft.responsable)<0;
  var respOpts = [el('option',{value:''},['— Responsable —'])].concat(
    allResps.map(function(n){ return el('option',{value:n,selected:formDraft.responsable===n},[n]); })
  ).concat([el('option',{value:'__libre__',selected:isRespFree},['Autre / saisie libre…'])]);

  var recurrenceOpts = ['none','hebdomadaire','jours-semaine','bimensuel','mensuel','mensuel-sem'];
  var recurrenceLabels = {
    none:'Pas de récurrence',
    hebdomadaire:'Toutes les semaines',
    'jours-semaine':'Jours choisis / semaine',
    bimensuel:'Toutes les 2 semaines',
    mensuel:'Même date chaque mois',
    'mensuel-sem':'Le Nième jour du mois',
  };

  // Boutons jours de la semaine (L M M J V S D)
  var JOURS_COURT = ['D','L','M','M','J','V','S'];
  var JOURS_LONG  = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var joursBlock = formDraft.recurrence==='jours-semaine' ? el('div',{class:'jours-semaine-block'},[
    el('div',{class:'field-label',style:'margin-bottom:6px;'},['Répéter le :']),
    el('div',{class:'jours-semaine-btns'},
      [0,1,2,3,4,5,6].map(function(j){
        var actif = (formDraft.joursActifs||[]).indexOf(j)>=0;
        return el('button',{
          type:'button',
          title:JOURS_LONG[j],
          class:'jour-btn'+(actif?' actif':''),
          onclick:function(){
            var ja = (formDraft.joursActifs||[]).slice();
            var idx = ja.indexOf(j);
            if(idx>=0) ja.splice(idx,1); else ja.push(j);
            formDraft.joursActifs = ja;
            render();
          }
        },[JOURS_COURT[j]]);
      })
    ),
    (formDraft.joursActifs||[]).length===0 ? el('div',{class:'jours-warning'},['⚠ Sélectionnez au moins un jour']) : null,
  ]) : null;
  var recurBtns = recurrenceOpts.map(function(r){
    return el('button',{
      class:'recur-opt'+(formDraft.recurrence===r?' active':''),
      onclick:function(){ formDraft.recurrence=r; render(); }
    },[recurrenceLabels[r]]);
  });

  // Sélecteurs pour récurrence "Nième jour du mois"
  var JOURS_SEMAINE = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  var ORDINALS = [{v:1,l:'1er'},{v:2,l:'2ème'},{v:3,l:'3ème'},{v:4,l:'4ème'},{v:5,l:'Dernier'}];
  // Pré-remplir nthDay depuis la date saisie si pas encore défini
  if(formDraft.recurrence==='mensuel-sem' && formDraft.nthDay===null && formDraft.date){
    var dTmp = new Date(formDraft.date+'T00:00:00');
    formDraft.nthDay = dTmp.getDay();
  }
  var nthBlock = formDraft.recurrence==='mensuel-sem' ? el('div',{class:'nth-block'},[
    el('div',{class:'nth-row'},[
      el('span',{class:'nth-label'},['Le']),
      el('select',{class:'nth-select',onchange:function(e){ formDraft.nthWeek=parseInt(e.target.value,10); }},
        ORDINALS.map(function(o){ return el('option',{value:o.v,selected:formDraft.nthWeek===o.v},[o.l]); })
      ),
      el('select',{class:'nth-select',onchange:function(e){ formDraft.nthDay=parseInt(e.target.value,10); }},
        JOURS_SEMAINE.map(function(j,i){ return el('option',{value:i,selected:formDraft.nthDay===i},[j]); })
      ),
      el('span',{class:'nth-label'},['du mois']),
    ]),
  ]) : null;

  var overlay = el('div',{class:'overlay',onclick:function(e){ if(e.target===overlay) closeEventForm(); }},[
    el('div',{class:'modal modal-wide'},[
      el('h2',{},[isEdit ? 'Modifier l\'événement' : 'Nouvel événement']),

      el('label',{class:'field-label'},['Date']),
      el('input',{type:'date',value:formDraft.date,oninput:function(e){ formDraft.date=e.target.value; }}),

      el('div',{style:'display:flex;gap:8px;margin-top:12px;'},[
        el('div',{style:'flex:1;'},[
          el('label',{class:'field-label'},['Heure début']),
          el('input',{type:'time',value:formDraft.heureDebut,oninput:function(e){ formDraft.heureDebut=e.target.value; }})
        ]),
        el('div',{style:'flex:1;'},[
          el('label',{class:'field-label'},['Heure fin']),
          el('input',{type:'time',value:formDraft.heureFin,oninput:function(e){ formDraft.heureFin=e.target.value; }})
        ]),
      ]),

      el('label',{class:'field-label'},['Département']),
      el('select',{onchange:function(e){ formDraft.departement=e.target.value; render(); }},deptOpts),

      el('label',{class:'field-label'},['Titre / description courte']),
      el('input',{type:'text',placeholder:'Ex. Répétition groupe louange, Réunion de prière…',value:formDraft.titre,oninput:function(e){ formDraft.titre=e.target.value; }}),
      el('label',{class:'field-label'},['Conducteur / animateur (optionnel)']),
      el('input',{type:'text',placeholder:'Ex. Paulina, Timothé… (affiché entre parenthèses)',
        value:formDraft.conducteur||'',oninput:function(e){ formDraft.conducteur=e.target.value; }}),

      el('label',{class:'field-label'},['Responsable']),
      el('select',{onchange:function(e){
        if(e.target.value === '__libre__'){ formDraft.responsable='__libre__'; }
        else { formDraft.responsable=e.target.value; }
        render();
      }},respOpts),
      formDraft.responsable === '__libre__' ? el('input',{
        type:'text', placeholder:'Prénom Nom du responsable',
        value: isRespFree ? formDraft._respLibre||'' : '',
        style:'margin-top:6px;',
        oninput:function(e){ formDraft._respLibre=e.target.value; }
      }) : null,

      el('label',{class:'field-label'},['Notes (facultatif)']),
      el('textarea',{placeholder:'Lieu, infos pratiques, lien Zoom…',oninput:function(e){ formDraft.notes=e.target.value; }},[formDraft.notes]),
      // ── Section Rappels email (repliable) ──
      renderRappelsSection(),

      !isEdit ? el('div',{},[
        // ── Durée : 1 jour OU plage multi-jours (mutuellement exclusif avec récurrence) ──
        el('div',{class:'duree-section'},[
          el('label',{class:'recur-fin-row',style:'cursor:pointer;font-size:13px;'},[
            el('input',{type:'checkbox',
              checked:formDraft.modeMultiJour,
              onchange:function(e){
                formDraft.modeMultiJour=e.target.checked;
                if(!e.target.checked){ formDraft.dateFinJour=''; }
                else { formDraft.recurrence='none'; }
                render();
              }}),
            el('span',{style:'margin-left:6px;font-weight:500;'},['Événement sur plusieurs jours (camp, retraite…)']),
          ]),
          formDraft.modeMultiJour ? el('div',{class:'multijour-row',style:'margin-top:8px;'},[
            el('div',{style:'flex:1;'},[
              el('label',{class:'field-label',style:'margin-bottom:4px;'},['Date de fin']),
              el('input',{type:'date',value:formDraft.dateFinJour,
                min:formDraft.date||'',
                style:'width:100%;',
                oninput:function(e){ formDraft.dateFinJour=e.target.value; render(); }}),
            ]),
          ]) : null,
          formDraft.modeMultiJour && formDraft.dateFinJour && formDraft.dateFinJour > (formDraft.date||'') ?
            el('div',{class:'multijour-preview'},[
              '📅 ',
              el('strong',{},[formDraft.date ? new Date(formDraft.date+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : '?']),
              ' → ',
              el('strong',{},[new Date(formDraft.dateFinJour+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})]),
              el('span',{style:'color:var(--ink-soft);font-size:11px;'},
                [' (' + (Math.round((new Date(formDraft.dateFinJour+'T00:00:00')-new Date(formDraft.date+'T00:00:00'))/(86400000))+1) + ' jours)']),
            ]) : null,
        ]),

        // ── Récurrence (masquée si modeMultiJour) ──
        !formDraft.modeMultiJour ? el('label',{class:'field-label'},['Récurrence']) : null,
        !formDraft.modeMultiJour ? el('div',{class:'recur-opts'},recurBtns) : null,
        !formDraft.modeMultiJour ? joursBlock : null,
        nthBlock,
        !formDraft.modeMultiJour && formDraft.recurrence !== 'none' ? el('div',{class:'recur-details'},[
          el('div',{class:'recur-fin-section'},[
            el('label',{class:'field-label'},['Se termine']),
            el('div',{class:'recur-fin-options'},[
              // Option 1 : Jamais
              el('label',{class:'recur-fin-row'},[
                el('input',{type:'radio',name:'recur_fin',value:'never',
                  checked:formDraft.recurrenceFin==='never',
                  onchange:function(){ formDraft.recurrenceFin='never'; render(); }}),
                el('span',{},[' Jamais']),
              ]),
              // Option 2 : Le [date]
              el('label',{class:'recur-fin-row'},[
                el('input',{type:'radio',name:'recur_fin',value:'date',
                  checked:formDraft.recurrenceFin==='date',
                  onchange:function(){ formDraft.recurrenceFin='date'; render(); }}),
                el('span',{},[' Le ']),
                el('input',{type:'date',
                  class:'recur-fin-date',
                  value:formDraft.recurrenceJusquau,
                  style:formDraft.recurrenceFin!=='date'?'opacity:0.4;':'',
                  oninput:function(e){
                    formDraft.recurrenceJusquau=e.target.value;
                    if(formDraft.recurrenceFin!=='date'){
                      formDraft.recurrenceFin='date';
                      // Cocher le radio correspondant sans render()
                      var radios=document.querySelectorAll('input[name="recur_fin"]');
                      radios.forEach(function(r){r.checked=(r.value==='date');});
                    }
                  },
                  onfocus:function(){
                    if(formDraft.recurrenceFin!=='date'){
                      formDraft.recurrenceFin='date';
                      render();
                    }
                  }}),
              ]),
              // Option 3 : Après N occurrences
              el('label',{class:'recur-fin-row'},[
                el('input',{type:'radio',name:'recur_fin',value:'count',
                  checked:formDraft.recurrenceFin==='count',
                  onchange:function(){ formDraft.recurrenceFin='count'; render(); }}),
                el('span',{},[' Après ']),
                el('input',{type:'number',min:'1',max:'365',
                  class:'recur-fin-count',
                  value:formDraft.recurrenceCount||52,
                  style:formDraft.recurrenceFin!=='count'?'opacity:0.4;':'',
                  oninput:function(e){
                    formDraft.recurrenceCount=parseInt(e.target.value,10)||1;
                  },
                  onfocus:function(){
                    if(formDraft.recurrenceFin!=='count'){
                      formDraft.recurrenceFin='count';
                      render();
                    }
                  }}),
                el('span',{},[' occurrence(s)']),
              ]),
            ]),
          ]),
          // Badge série existante
          formDraft._serieId ? el('div',{class:'serie-badge'},[
            '↻ Modification d\'une série existante — choix appliqué : ',
            el('strong',{},[{one:'occurrence seule',following:'à partir d\'ici',all:'toute la série'}[state.editSerieChoice]||'?']),
          ]) : null,
        ]) : null
      ]) : null,

      // ── Prévisualisation des occurrences ──
      !formDraft.modeMultiJour && formDraft.recurrence && formDraft.recurrence !== 'none' ? (function(){
        var previewDates = buildRecurrenceDates(
          formDraft.date,
          formDraft.recurrence,
          formDraft.recurrenceFin==='date' ? formDraft.recurrenceJusquau : null,
          formDraft.nthWeek,
          formDraft.nthDay,
          formDraft.recurrenceFin,
          parseInt(formDraft.recurrenceCount,10)||52,
          formDraft.joursActifs||[]
        );
        if(!previewDates || previewDates.length===0) return null;
        var showMax = 8;
        var shown = previewDates.slice(0,showMax);
        var remaining = previewDates.length - shown.length;
        var dateItems = shown.map(function(d){
          var dt = new Date(d+'T00:00:00');
          var dateLabel = '• '+dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
          // Chercher si cette occurrence existe dans state.events (série existante)
          var occEvt = null;
          var sid = formDraft._serieId;
          if(sid){
            var evtIds = Object.keys(state.events);
            for(var k=0;k<evtIds.length;k++){
              var ev = state.events[evtIds[k]];
              if(ev.serieId === sid && ev.date === d){ occEvt = ev; break; }
            }
          }
          // Si l'occurrence existe ET qu'on est admin → cliquable

function formatDateFR(iso){
  if(!iso) return '';
  var d = new Date(iso+'T00:00:00');
  return JOURS_LONG[d.getDay()] + ' ' + d.getDate() + ' ' + MOIS_FR[d.getMonth()] + ' ' + d.getFullYear();
}

// Liste des noms d'intervenants à jour : base + modifications admin du Planning
// (lues en temps réel depuis planning_culte_2026/intervenants)
function getIntervenantsNoms(){
  var base = (window.__INTERVENANTS_NOMS_BASE__ || []).slice();
  var byNom = {};
  base.forEach(function(n){ byNom[n] = true; });
  var ov = state.planningIntervenantsOverrides || {};
  Object.keys(ov).forEach(function(nom){
    if(nom.indexOf('__deleted__') === 0){
      var orig = nom.slice('__deleted__'.length);
      delete byNom[orig];
    } else if(ov[nom] && (ov[nom].__deleted || ov[nom]._deleted)){
      delete byNom[nom];
    } else if(ov[nom] && ov[nom].nom){
      byNom[ov[nom].nom] = true;
    }
  });
  return Object.keys(byNom).sort(function(a,b){
    return a.localeCompare(b, 'fr', {sensitivity:'base'});
  });
}

  if(!hasSerie || state.deleteConfirm){
    // Confirmation finale
    var msg = hasSerie ? {
      one: 'Supprimer uniquement cette occurrence du '+formatDateFR(evt.date)+' ?',
      following: 'Supprimer cette occurrence et toutes les suivantes (à partir du '+formatDateFR(evt.date)+') ?',
      all: 'Supprimer toutes les occurrences de la série "'+evt.titre+'" ?',
    }[state.deleteChoice || 'one']

          state.showDeleteModal=null; state.deleteChoice=null; state.deleteConfirm=false; render();
        }},['Annuler']),

              return ev.serieId===sid;

            for(var i=0;i<toDelete.length;i++) try{await deleteEvent(toDelete[i].id);}catch(e){}
            showToast(toDelete.length+' occurrence(s) supprimée(s).');
          }
          state.showDeleteModal=null; state.deleteChoice=null; state.deleteConfirm=false;
          render();
        }},['Confirmer la suppression']),

// ============================================================
// VUE MOIS
// ============================================================
function renderMonthView(){
  if(state.loading) return el('div',{style:'padding:40px;text-align:center;color:var(--ink-soft);'},['Chargement…']);
  // Calculer le mois affiché
  var now = new Date();
  var base = new Date(now.getFullYear(), now.getMonth() + state.monthOffset, 1);
  var yr = base.getFullYear();
  var mo = base.getMonth(); // 0-11

  // 1er jour du mois et dernier
  var firstDay = new Date(yr, mo, 1);
  var lastDay  = new Date(yr, mo+1, 0);

  // Début de la grille : lundi avant le 1er (ou le 1er si c'est lundi)
  var startDow = (firstDay.getDay()+6)%7; // 0=lundi
  var gridStart = new Date(firstDay);
  gridStart.setDate(1 - startDow);

  // Nom du mois
  var moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var joursLabels = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  // Navigation mois
  var nav = el('div',{class:'month-view-nav'},[
    el('button',{class:'pill-btn ghost',onclick:function(){ state.monthOffset--; render(); }},['‹']),
    el('h2',{class:'month-view-title'},[moisNoms[mo]+' '+yr]),
    el('button',{class:'pill-btn ghost',onclick:function(){ state.monthOffset=0; render(); }},['Ce mois']),
    el('button',{class:'pill-btn ghost',onclick:function(){ state.monthOffset++; render(); }},['›']),
  ]);

  // En-têtes jours
  var headers = el('div',{class:'month-grid-header'},
    joursLabels.map(function(j){ return el('div',{class:'month-col-header'},[j]); })
  );

  // Cellules
  var cells = [];
  var cur = new Date(gridStart);
  var todayISO = toISO(new Date());

  for(var row=0; row<6; row++){
    for(var col=0; col<7; col++){
      var iso = toISO(cur);
      var isCurrentMonth = cur.getMonth() === mo;
      var isToday = iso === todayISO;

      // Events du jour
      var dayEvts = Object.values(state.events).filter(function(e){
        if(!state.isStaff && !isValidated(e)) return false;
        if(e.date===iso) return true;
        if(e.dateFinJour&&e.dateFinJour>e.date&&iso>e.date&&iso<=e.dateFinJour) return true;
        return false;
      });
      dayEvts.sort(function(a,b){ return (a.heureDebut||'').localeCompare(b.heureDebut||''); });

      var chips = dayEvts.slice(0,3).map(function(evt){
        var dept = deptById(evt.departement||'Autre');
        return el('div',{
          class:'month-chip chip-'+dept.cls,
          onclick:function(e){ e.stopPropagation(); state.showEventDetail=evt.id; render(); }
        },[
          evt.titre ? evt.titre.slice(0,22)+(evt.titre.length>22?'…':'') : ''
        ]);
      });
      if(dayEvts.length > 3){
        chips.push(el('div',{class:'month-more'},['+'+(dayEvts.length-3)+' autre'+(dayEvts.length-3>1?'s':'')]));
      }
      // Bloc culte du dimanche dans la cellule DIM de la vue mois
      var culteChip = null;
      var cellDate = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate());
      if(cellDate.getDay() === 0){ // Dimanche
        var culteInfo = getCulteOverrideForDate(iso);
        if(culteInfo && (culteInfo.predicateur || culteInfo.presidentCulte || culteInfo.hasSainteCene)){
          var culteLines = [];
          // Badge Sainte-Cène
          if(culteInfo.hasSainteCene){
            culteLines.push(el('span',{class:'month-culte-sc'},['✦ SC']));
          }
          if(culteInfo.predicateur){
            culteLines.push(el('span',{class:'month-culte-label'},['Prédicateur']));
            culteLines.push(el('span',{class:'month-culte-value'},[culteInfo.predicateur]));
          }
          if(culteInfo.presidentCulte){
            culteLines.push(el('span',{class:'month-culte-label',style:'margin-top:2px;'},['Président']));
            culteLines.push(el('span',{class:'month-culte-value'},[culteInfo.presidentCulte]));
          }
          culteChip = el('div',{class:'month-culte-chip'},culteLines);
        }
      }

      // Bouton + pour ajouter (staff seulement)
      var addBtn = (state.isStaff && isCurrentMonth) ? el('button',{
        class:'month-add-btn',
        onclick:function(isoC){ return function(e){ e.stopPropagation(); openNewEvent(isoC); render(); }; }(iso)
      },['＋']) : null;

      cells.push(el('div',{
        class:'month-cell'+(isCurrentMonth?'':' other-month')+(isToday?' month-today':''),
      },[
        el('div',{class:'month-cell-header'},[
          el('span',{class:'month-day-num'+(isToday?' today-num':'')},[String(cur.getDate())]),
          addBtn,
        ]),
        el('div',{class:'month-cell-body'},chips.concat(culteChip?[culteChip]:[])),
      ]));

      cur.setDate(cur.getDate()+1);
    }
  }

  return el('div',{class:'month-view'},[
    nav,
    headers,
    el('div',{class:'month-grid'},cells),
  ]);
}



// ── Vérification indisponibilité (côté Agenda mensuel) ──────
function isIndisponibleStaff(nom, dateISO){
  if(!nom || !dateISO) return null; // null = pas d'info
  var ov = state.planningIntervenantsOverrides || {};
  // Chercher dans les overrides Firebase
  var p = ov[nom];
  if(!p) return null;
  if(!p.indisponibleDu || !p.indisponibleAu) return null;
  if(dateISO >= p.indisponibleDu && dateISO <= p.indisponibleAu){
    return {du: p.indisponibleDu, au: p.indisponibleAu};
  }
  return null;
}


// ── Mode Planning mobile — liste chronologique ───────────────
function renderPlanningView(){
  if(state.loading) return el('div',{class:'loading'},['Chargement…']);
  var today = toISO(new Date());
  // Depuis le 1er janvier de l'année en cours
  var startOfYear = new Date().getFullYear() + '-01-01';

  // Grouper les événements Staff par date
  var byDate = {};
  Object.values(state.events).forEach(function(ev){
    if(!state.isStaff && !isValidated(ev)) return;
    if(ev.date < startOfYear) return;
    if(!byDate[ev.date]) byDate[ev.date] = [];
    byDate[ev.date].push(ev);
  });

  // Inclure TOUS les dimanches depuis début d'année de PLANNING_CULTE_DATES
  // même ceux sans événements Staff (pour afficher le bloc culte)
  Object.keys(PLANNING_CULTE_DATES).forEach(function(dateISO){
    if(dateISO < startOfYear) return;
    if(!byDate[dateISO]) byDate[dateISO] = [];
  });

  var allDates = Object.keys(byDate).sort();
  if(allDates.length === 0){
    return el('div',{class:'planning-empty'},['Aucun événement à venir.']);
  }

  // Grouper par mois pour les en-têtes
  var rows = [];
  var prevMonth = null;

  allDates.forEach(function(dateISO){
    var d = new Date(dateISO+'T00:00:00');
    var mois = d.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    var moisKey = dateISO.slice(0,7); // YYYY-MM

    // En-tête de mois sticky avec ancre pour le scroll
    if(mois !== prevMonth){
      rows.push(el('div',{
        class:'pl-month-header',
        id:'pl-month-'+moisKey
      },[mois]));
      prevMonth = mois;
    }

    var dayLabel = d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,3);
    var dayNum = d.getDate();
    var evtsOfDay = byDate[dateISO];

    // Bloc culte du dimanche
    var culteBlock = null;
    if(d.getDay() === 0){
      var culte = getCulteOverrideForDate(dateISO);
      if(culte && (culte.predicateur || culte.presidentCulte || culte.hasSainteCene || culte.remarques)){
        var culteLines = [];
        if(culte.hasSainteCene) culteLines.push(el('div',{class:'pl-culte-line'},[
          el('span',{class:'pl-culte-badge-sc'},['❆ Sainte-Cène'])
        ]));
        if(culte.predicateur) culteLines.push(el('div',{class:'pl-culte-line'},[
          el('span',{class:'pl-culte-key'},['Prédicateur']),
          el('span',{class:'pl-culte-val'},[culte.predicateur])
        ]));
        if(culte.presidentCulte) culteLines.push(el('div',{class:'pl-culte-line'},[
          el('span',{class:'pl-culte-key'},['Président']),
          el('span',{class:'pl-culte-val'},[culte.presidentCulte])
        ]));
        if(culte.remarques) culteLines.push(el('div',{class:'pl-culte-line pl-culte-remarque'},[
          el('span',{class:'pl-culte-key'},['Note']),
          el('span',{class:'pl-culte-val'},[culte.remarques])
        ]));
        culteBlock = el('div',{class:'pl-culte-block'+(culte.hasSainteCene?' pl-culte-sc':'')},culteLines);
      }
    }

    // Chips événements Staff
    var evtChips = (evtsOfDay||[]).map(function(evt){
      var dept = deptById(evt.departement||'Autre');
      return el('div',{
        class:'pl-event',
        style:'border-left:3px solid '+dept.color+';',
        onclick:function(){ state.showEventDetail=evt.id; render(); }
      },[
        el('div',{class:'pl-event-title'},[evt.titre||'(sans titre)']),
        evt.heureDebut ? el('div',{class:'pl-event-time'},[evt.heureDebut+(evt.heureFin?' – '+evt.heureFin:'')]) : null,
        evt.responsable ? el('div',{class:'pl-event-resp'},[evt.responsable]) : null,
      ]);
    });

    // N'afficher la ligne que si elle contient quelque chose
    if(!culteBlock && evtChips.length === 0) return;

    rows.push(el('div',{class:'pl-day-row'},[
      el('div',{class:'pl-day-label'},[
        el('div',{class:'pl-day-name'},[dayLabel]),
        el('div',{class:'pl-day-num',
          style:dateISO===today?'background:var(--action);color:white;border-radius:50%;':''
        },[String(dayNum)])
      ]),
      el('div',{class:'pl-day-events'},[
        culteBlock,
        evtChips.length > 0 ? el('div',{class:'pl-events-list'},evtChips) : null,
      ])
    ]));
  });

  return el('div',{class:'planning-view'},rows);
}


// ── Ajustement offsets sticky mobile Agenda ──────────────────
function adjustMobileOffsetsStaff(){
  var topbar = document.querySelector('.topbar');
  if(!topbar) return;
  var tbH = topbar.offsetHeight;
  // Écrire la CSS variable --topbar-height pour tous les éléments sticky
  document.documentElement.style.setProperty('--topbar-height', tbH + 'px');
  // id-bar sous la topbar
  var idBar = document.querySelector('.id-bar');
  if(idBar){ idBar.style.top = tbH + 'px'; }
  // Navigation des mois
  var monthNav = document.querySelector('.month-nav');
  if(monthNav){
    var idBarH = idBar ? idBar.offsetHeight : 0;
    monthNav.style.top = (tbH + idBarH) + 'px';
  }
  // pl-month-header sous topbar + id-bar
  var idBarH2 = idBar ? idBar.offsetHeight : 0;
  var headers = document.querySelectorAll('.pl-month-header');
  headers.forEach(function(h){ h.style.top = (tbH + idBarH2) + 'px'; });
}

            ov.push({nom:oldNom, _deleted:true});
          }
          if(nom && rf.email) state.emailsStaff[nom] = rf.email.trim();
          else if(nom) delete state.emailsStaff[nom];
          ov = ov.filter(function(x){ return x.nom!==nom; });
          ov.push({nom:nom});
          state.responsablesOverrides = ov;
          await saveStaffConfig();
          showToast((isNewResp?'Ajouté : ':'Mis à jour : ')+nom);
          state.manageRespEditing=null; render();
        }},['Enregistrer'])
      ])
    ])
  ]);
}
