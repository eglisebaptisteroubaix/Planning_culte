// ── Envoi rappel email Agenda mensuel ───────────────────────
var EMAILJS_SVC_AGENDA   = 'service_kpo2kbv';
var EMAILJS_TPL_AGENDA   = 'template_jzr7j7c';
var EMAILJS_KEY_AGENDA   = 'ghEB6k_4E3NYX8nJw';

function formatDateFR(dateISO){
  if(!dateISO) return '';
  var d = new Date(dateISO+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function audienceLabel(audience){
  if(audience==='union') return 'Réunion Église de l\'Union';
  if(audience==='baptiste') return 'Réunion Église Baptiste';
  return 'Réunion commune aux deux Églises (Union & Baptiste)';
}

async function envoyerRappelAgenda(evt, typeRappel){
  // typeRappel = 'J-6' ou 'J-2' ou 'maintenant'
  var destinataires = evt.destinataires || [];
  var emailsLibres  = evt.emailsLibres  || [];

  if(destinataires.length === 0 && emailsLibres.length === 0){
    showToast('Aucun destinataire configuré pour cet événement.'); return;
  }

  // Construire la liste des emails avec noms
  var targets = [];
  destinataires.forEach(function(nom){
    var email = state.emailsStaff[nom];
    if(email) targets.push({nom:nom, email:email});
    else console.warn('Pas d\'email pour', nom);
  });
  emailsLibres.forEach(function(email){
    targets.push({nom:'', email:email});
  });

  if(targets.length === 0){
    showToast('Aucun email renseigné pour les destinataires. Vérifiez les emails dans Gérer → Responsables.'); return;
  }

  var dateFormatee = formatDateFR(evt.date);
  var heure = evt.heureDebut ? (evt.heureDebut + (evt.heureFin ? ' – '+evt.heureFin : '')) : '';
  var aud   = audienceLabel(evt.audience||'commun');
  var notes = evt.notes ? ('📝 '+evt.notes) : '';
  var labelRappel = typeRappel === 'maintenant' ? 'Rappel' : ('Rappel '+typeRappel);

  var nbOk=0, nbErr=0;
  for(var i=0; i<targets.length; i++){
    var t = targets[i];
    var prenom = t.nom ? t.nom.split(' ')[0] : 'Bonjour';
    var params = {
      to_email:    t.email,
      to_name:     t.nom || t.email,
      subject:     labelRappel+' — '+evt.titre+' le '+dateFormatee,
      message:
        'Bonjour '+prenom+',\n\n'+
        'Petit rappel amical : tu es attendu(e) à la réunion suivante :\n\n'+
        '📅 '+evt.titre+'\n'+
        '🗓 '+dateFormatee+(heure?' à '+heure:'')+'\n'+
        '👥 '+aud+'\n'+
        (notes?'\n'+notes+'\n':'')+
        '\nÀ bientôt !\nL\'équipe CEU & Baptiste — Roubaix'
    };
    try{
      await emailjs.send(EMAILJS_SVC_AGENDA, EMAILJS_TPL_AGENDA, params);
      nbOk++;
    } catch(e){
      console.error('EmailJS erreur pour', t.email, e);
      nbErr++;
    }
  }

  // Marquer le rappel comme envoyé dans Firebase
  var now = new Date().toISOString();
  var update = {};
  if(typeRappel==='J-6') update.rappelJ6 = now;
  else if(typeRappel==='J-2') update.rappelJ2 = now;
  else update.rappelManuel = now;
  try{ await fsSetDoc(fsDoc(db,'calendrier_staff',evt.id), update, {merge:true}); }
  catch(e){ console.error('Erreur Firebase rappel:', e); }

  if(nbErr===0) showToast('✅ '+nbOk+' rappel'+(nbOk>1?'s':'')+' envoyé'+(nbOk>1?'s':'')+' !');
  else showToast('⚠ '+nbOk+' envoyé'+(nbOk>1?'s':'')+', '+nbErr+' échec'+(nbErr>1?'s':'')+'.');
  render();
}


function render(){
  // Sauvegarder la position de scroll de la modal avant re-render
  var _modalScroll = 0;
  var _prevModal = document.querySelector('.modal');
  if(_prevModal) _modalScroll = _prevModal.scrollTop;

  var root = document.getElementById('root');
  root.innerHTML = '';
  var pb = renderPublicBanner(); if(pb) root.appendChild(pb);
  var lh = renderLandscapeHint(); if(lh) root.appendChild(lh);

  root.appendChild(renderTopbar());

  if(state.configMissing){
    root.appendChild(el('div',{style:'text-align:center;padding:60px 20px;'},['Connexion Firebase impossible.']));
    return;
  }

  if(!state.isStaff){
    // Mode public : afficher le calendrier en lecture seule (pas de return)
    // La bannière "Mode consultation" est déjà affichée par renderPublicBanner()
  }

  var idBar = renderIdBar();
  if(idBar) root.appendChild(idBar);

  root.appendChild(renderMonthNav());
  if(state.viewMode!=='month') root.appendChild(renderWeekNav());

  if(state.loading){
    root.appendChild(el('div',{style:'text-align:center;padding:40px;color:var(--ink-soft);'},['Chargement…']));
  } else {
    var onMobile = window.innerWidth < 768;
    if(state.viewMode==='month'){
      root.appendChild(renderMonthView());
    } else if(onMobile){
      root.appendChild(renderPlanningView());
    } else {
      root.appendChild(renderWeekGrid());
    }
    if(!onMobile) root.appendChild(renderLegend());
  }

  setTimeout(adjustMobileOffsetsStaff, 0); setTimeout(adjustMobileOffsetsStaff, 150);
  var adminMenuMob = renderAdminMenuMobile(); if(adminMenuMob) root.appendChild(adminMenuMob);

  // Bouton Aujourd'hui flottant — mode Planning mobile uniquement
  if(window.innerWidth < 768 && state.viewMode !== 'month'){
    var todayBtn = el('button',{
      class:'btn-today-float',
      onclick:function(){
        var todayEl = document.querySelector('.pl-day-num[style*="background"]');
        if(todayEl) todayEl.scrollIntoView({behavior:'smooth', block:'center'});
      }
    },['📅 Aujourd\'hui']);
    root.appendChild(todayBtn);
  }
  root.appendChild(el('div',{class:'footer-note'},['Calendrier réservé au Staff — Église de l\'Union & Baptiste de Roubaix · Données synchronisées en temps réel']));

  var ls = renderLoginStaff(); if(ls) root.appendChild(ls);
  var la = renderLoginAdmin(); if(la) root.appendChild(la);
  // renderEventForm attaché à document.body (règle sous-modal)
  var old__ef = document.getElementById('__eventFormMod');
  if(old__ef) old__ef.parentNode.removeChild(old__ef);
  var ef = renderEventForm();
  if(ef){ ef.id='__eventFormMod'; document.body.appendChild(ef); }
  var ed = renderEventDetail();if(ed) root.appendChild(ed);
  var cfm = renderCulteFieldModal(); if(cfm) root.appendChild(cfm);
  var mcm = renderManageConfigModal(); if(mcm) root.appendChild(mcm);
  // Sous-modals hors contexte d'empilement → attachées à document.body
  // Nettoyage des précédentes avant ajout
  ['__monEmailMod','__respFormMod','__groupeFormMod'].forEach(function(id){
    var old = document.getElementById(id);
    if(old) old.parentNode.removeChild(old);
  });
  var monEmailMod = renderMonEmailModal();
  if(monEmailMod){ monEmailMod.id='__monEmailMod'; document.body.appendChild(monEmailMod); }
  var respFormMod = renderRespFormModal();
  if(respFormMod){ respFormMod.id='__respFormMod'; document.body.appendChild(respFormMod); }
  var groupeFormMod = renderGroupeFormModal();
  if(groupeFormMod){ groupeFormMod.id='__groupeFormMod'; document.body.appendChild(groupeFormMod); }
  var old__rdm = document.getElementById('__deleteModMod');
  if(old__rdm) old__rdm.parentNode.removeChild(old__rdm);
  var rdm = renderDeleteModal();
  if(rdm){ rdm.id='__deleteModMod'; document.body.appendChild(rdm); }
  var old__rem = document.getElementById('__editSerieMod');
  if(old__rem) old__rem.parentNode.removeChild(old__rem);
  var rem = renderEditSerieModal();
  if(rem){ rem.id='__editSerieMod'; document.body.appendChild(rem); }
  if(state.toast) root.appendChild(el('div',{class:'toast'},[state.toast]));

  // Restaurer le scroll de la modal après re-render
  if(_modalScroll > 0){
    var _newModal = document.querySelector('.modal');
    if(_newModal) _newModal.scrollTop = _modalScroll;
  }
}

// BOOTSTRAP
// ============================================================


function bootstrapApp(){

  // Recalculer les offsets au resize
  window.removeEventListener('resize', adjustMobileOffsetsStaff);
  window.addEventListener('resize', adjustMobileOffsetsStaff);
  if(window.__FIREBASE_CONFIG_MISSING__){
    state.loading=false; state.configMissing=true; render(); return;
  }
  loadPlanningData();
  initFirebase();
  render();

}

var bootstrapped = false;
function bootstrapOnce(){
  if(bootstrapped) return;
  bootstrapped = true;
  bootstrapApp();
}

if(window.__FIREBASE_STAFF_READY__ || window.__FIREBASE_CONFIG_MISSING__){
  bootstrapOnce();
} else {
  window.addEventListener('firebase-staff-ready', bootstrapOnce, {once:true});
  setTimeout(function(){
    if(!bootstrapped){ window.__FIREBASE_CONFIG_MISSING__=true; bootstrapOnce(); }
  }, 5000);
}

})();
